<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribute | Miss Nyx Postrano</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.6);
            --bg: #050505; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Optima', 'Segoe UI', serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Cinematic Overlays */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.4; pointer-events: none; }
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); 
            z-index: 10; pointer-events: none; 
        }
        
        /* Shutter/Flash Effect */
        #shutter { 
            position: fixed; inset: 0; background: white; 
            z-index: 999; opacity: 0; pointer-events: none; 
        }

        /* Enhanced Lyric Container */
        #lyric-container {
            position: fixed;
            bottom: 10%;
            width: 100%;
            text-align: center;
            z-index: 100;
            perspective: 1000px;
        }

        .subtitle-text {
            font-size: 2.4rem;
            font-style: italic;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
            opacity: 0;
            transform: scale(0.95) translateY(30px);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .subtitle-text.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
            50% { filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.6)); }
        }

        /* Intro Screen */
        #gate { 
            position: fixed; inset: 0; 
            background: #000; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
            transition: 2s ease-in-out; 
        }

        .gate-card { 
            text-align: center; padding: 60px;
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            background: rgba(5,5,5,0.9);
            backdrop-filter: blur(10px);
        }

        .start-btn { 
            margin-top: 40px; padding: 15px 60px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); font-size: 0.9rem; cursor: pointer; 
            letter-spacing: 10px; transition: 0.5s; text-transform: uppercase;
        }

        .start-btn:hover { 
            background: var(--gold); color: black; 
            box-shadow: 0 0 30px var(--gold-glow); 
        }

        /* Slideshow Engine */
        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 2.5s ease; visibility: hidden; 
        }

        .slide.active { opacity: 1; visibility: visible; }

        .slide img, .slide video { 
            max-width: 95%; max-height: 90vh; 
            object-fit: contain; 
            box-shadow: 0 0 100px rgba(0,0,0,1);
            transform: scale(1.1);
        }

        /* Ken Burns Effect */
        .slide.active img {
            animation: kenBurns 7s ease-out forwards;
        }

        @keyframes kenBurns {
            0% { transform: scale(1.1) translateY(0); }
            100% { transform: scale(1) translateY(-10px); }
        }

        .final-box h1 { 
            font-size: 4.5rem; letter-spacing: 15px; 
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="shutter"></div>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<div id="gate">
    <div class="gate-card">
        <h1 style="letter-spacing: 12px; color: var(--gold);">WALKING IN THE WIND</h1>
        <p style="opacity: 0.5; letter-spacing: 5px; font-style: italic;">A TRIBUTE TO EXCELLENCE & SERVICE</p>
        <h2 style="font-size: 2.8rem; color: #fff; margin: 15px 0; font-weight: 300;">Miss Nyx Postrano</h2>
        <button class="start-btn" onclick="ignite()">Enter Journey</button>
    </div>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV" muted></video></div>
    <div class="slide"><video src="3.MOV" muted></video></div>
    <div class="slide"><video src="4.MOV" muted></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p style="letter-spacing: 10px; opacity: 0.6;">NEW CHAPTERS AWAIT</p>
            <h1>NYX POSTRANO</h1>
            <p style="opacity: 0.8; font-size: 1.2rem; letter-spacing: 2px; font-style: italic;">
                "You'll find me in the region of the stars."
            </p>
            <div style="width: 80px; height: 1px; background: var(--gold); margin: 40px auto;"></div>
            <p style="opacity: 0.4; letter-spacing: 4px;">ZAMBOANGA CITY, PHILIPPINES | 2026</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const shutter = document.getElementById('shutter');
    const subtitle = document.getElementById('subtitle');
    let currentIdx = 0;

    // Precisely timed for "Walking in the Wind" phrasing
    const lyrics = [
        { time: 1, text: "A Journey of Service & Homecoming" },
        { time: 6, text: "Dedicated to Miss Nyx Postrano" },
        { time: 15, text: "A week ago you said to me..." },
        { time: 18, text: "Do you believe I'll never be too far?" },
        { time: 23, text: "If I'm lost, just look for me" },
        { time: 26, text: "You'll find me in the region of the stars" },
        { time: 31, text: "I told you never to take a look back" },
        { time: 35, text: "We'll be together again, I hope that" },
        { time: 46, text: "Walking in the wind..." },
        { time: 50, text: "Smiling at the sunset" },
        { time: 54, text: "I'll be greatly missed" },
        { time: 58, text: "But I know you'll never forget" },
        { time: 105, text: "The mark you left will never fade." },
        { time: 155, text: "Your hometown assignment awaits." },
        { time: 198, text: "Welcome home, Miss Nyx Postrano." }
    ];

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 60 },
            "color": { "value": "#d4af37" },
            "size": { "value": 1.5 },
            "move": { "enable": true, "speed": 0.8, "direction": "top", "random": true }
        }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        document.getElementById('gate').style.pointerEvents = 'none';
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (current >= curr.time ? curr : prev), null);
            
            // Auto-clear logic: hide if current time is 4s past the lyric start
            const shouldHide = active && (current > active.time + 4.5);

            if (active && subtitle.innerText !== active.text && !shouldHide) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 400);
            } else if (shouldHide) {
                subtitle.classList.remove('active');
            }
        };
    }

    function runEngine() {
        slides.forEach(s => {
            s.classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        const slide = slides[currentIdx];
        slide.classList.add('active');
        
        // Trigger Camera Flash effect
        shutter.style.opacity = '0.6';
        setTimeout(() => { shutter.style.opacity = '0'; }, 100);

        const video = slide.querySelector('video');
        if (video) {
            music.volume = 0.2; // Dim music for video sound
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                music.volume = 1.0;
                advance();
            };
        } else {
            // Adjust slide speed here (4800ms = 4.8 seconds)
            setTimeout(advance, 4800);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
