<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribute to Miss Nyx Postrano</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.5);
            --bg: #050505; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Ambient Background */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.35; }
        
        /* Shutter & Vignette */
        #shutter { position: fixed; inset: 0; background: white; z-index: 999; opacity: 0; pointer-events: none; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%); z-index: 10; pointer-events: none; }

        /* Lyric Subtitles */
        #lyric-box {
            position: fixed;
            bottom: 8%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        #subtitle {
            font-size: 1.8rem;
            font-style: italic;
            color: white;
            text-shadow: 2px 2px 20px rgba(0,0,0,1);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
            display: inline-block;
            padding: 5px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        #subtitle.visible { opacity: 1; transform: translateY(0); }

        /* Gate / Intro */
        #gate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .gate-card { 
            text-align: center; padding: 70px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(15px);
        }

        .start-btn { 
            margin-top: 40px; padding: 18px 65px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); font-size: 1rem; cursor: pointer; 
            letter-spacing: 7px; transition: 0.5s; text-transform: uppercase;
        }

        .start-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 50px var(--gold-glow); }

        /* Image Slide Engine */
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; inset: 0; opacity: 0; display: flex; align-items: center; justify-content: center; transition: opacity 2s ease-in-out; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; }

        .slide img { 
            max-width: 80%; max-height: 80vh; object-fit: contain; 
            filter: drop-shadow(0 10px 50px rgba(0,0,0,1));
            transform: scale(1.1);
        }

        .slide.active img { animation: cinematicZoom 6s linear forwards; }

        @keyframes cinematicZoom {
            from { transform: scale(1.1) translateY(0); }
            to { transform: scale(1.0) translateY(-10px); }
        }

        video { max-width: 85%; max-height: 85vh; border: 1px solid var(--gold); }

        .final-box h1 { 
            font-size: clamp(2.5rem, 6vw, 5.5rem); letter-spacing: 12px; text-transform: uppercase;
            background: linear-gradient(to bottom, #f1d592, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="shutter"></div>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="lyric-box"><span id="subtitle"></span></div>

<div id="gate">
    <div class="gate-card">
        <h1 style="letter-spacing: 14px; font-weight: 100; color: var(--gold);">WALKING IN THE WIND</h1>
        <p style="opacity: 0.6; letter-spacing: 5px;">A TRIBUTE TO</p>
        <h2 style="font-size: 2.8rem; color: var(--gold);">MISS NYX POSTRANO</h2>
        <button class="start-btn" onclick="ignite()">Begin Journey</button>
    </div>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV" muted></video></div>
    <div class="slide"><video src="3.MOV" muted></video></div>
    <div class="slide"><video src="4.MOV" muted></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p>Welcome Home</p>
            <h1>MISS NYX POSTRANO</h1>
            <p>A new chapter begins today.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const subtitle = document.getElementById('subtitle');
    const shutter = document.getElementById('shutter');
    let currentIdx = 0;

    // --- LYRICS DATA ---
    const lyricTimeline = [
        { time: 2, text: "A week ago you said to me..." },
        { time: 6, text: "Do you believe I'll ever be back?" },
        { time: 11, text: "Miss Nyx, you're home now." },
        { time: 16, text: "Walking in the wind..." },
        { time: 21, text: "We carry your stories..." },
        { time: 28, text: "Through the highs and lows." },
        { time: 35, text: "Yesterday's a memory." },
        { time: 42, text: "Every step brings a new light." },
        { time: 190, text: "Welcome Home, Miss Nyx Postrano." }
    ];

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#d4af37" },
            "opacity": { "value": 0.3 },
            "size": { "value": 1.2 },
            "move": { "enable": true, "speed": 0.5, "direction": "top" }
        }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 2500);
        music.play();
        runEngine();
        
        // Lyric Sync Logic
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyricTimeline.find((l, i) => 
                current >= l.time && (!lyricTimeline[i+1] || current < lyricTimeline[i+1].time)
            );
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('visible');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('visible');
                }, 300);
            }
        };
    }

    function runEngine() {
        slides.forEach(s => s.classList.remove('active'));
        slides[currentIdx].classList.add('active');
        
        // Shutter Flash Effect
        shutter.style.opacity = '0.3';
        setTimeout(() => shutter.style.opacity = '0', 200);

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            music.volume = 0.15;
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                music.volume = 1;
                advance();
            };
        } else {
            // Calculated timing: 202 seconds / 39 total slides ≈ 5100ms
            setTimeout(advance, 5100);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
