<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer Tribute - Animated Presentation</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; }
        
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .play-btn { padding: 15px 40px; font-size: 1.5rem; cursor: pointer; background: #d4af37; border: none; border-radius: 50px; color: #000; font-weight: bold; transition: 0.3s; }
        .play-btn:hover { background: #fff; transform: scale(1.05); }

        .slide-deck { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 1.5s ease-in-out; }
        .slide.active { opacity: 1; visibility: visible; }

        /* Animated Image Effect */
        .slide img { 
            max-width: 90%; max-height: 85vh; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
            transform: scale(1);
            transition: transform 6s linear;
        }
        .slide.active img { transform: scale(1.1); }

        .slide video { max-width: 95%; max-height: 90vh; }

        .text-overlay { text-align: center; max-width: 800px; }
        .gold-text { color: #d4af37; font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .sub-text { font-size: 1.8rem; line-height: 1.6; font-style: italic; }
    </style>
</head>
<body>

<video id="mainAudio" style="display:none;">
    <source src="vidaudio.mp4" type="video/mp4">
</video>

<div id="start-screen">
    <h2 style="letter-spacing: 3px;">HONORING OUR OFFICER</h2>
    <button class="play-btn" onclick="beginShow()">START PRESENTATION</button>
</div>

<div class="slide-deck">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video id="v1" src="2.MOV"></video></div>
    <div class="slide"><video id="v2" src="3.MOV"></video></div>
    <div class="slide"><video id="v3" src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="text-overlay">
            <h1 class="gold-text">Welcome Home</h1>
            <p class="sub-text">
                Congratulations on your new assignment.<br>
                We will miss you here, but we're happy you're home.<br>
                Thank you for the memories.
            </p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const bgAudio = document.getElementById('mainAudio');
    let currentIdx = 0;
    const imgTime = 5000; // 5 seconds per image

    function beginShow() {
        document.getElementById('start-screen').style.display = 'none';
        bgAudio.play();
        playSequence();
    }

    function playSequence() {
        // Reset all
        slides.forEach(s => s.classList.remove('active'));
        
        const currentSlide = slides[currentIdx];
        currentSlide.classList.add('active');

        const vid = currentSlide.querySelector('video');
        
        if (vid) {
            // Lower background audio for the clip
            bgAudio.volume = 0.1;
            vid.play();
            vid.onended = () => {
                bgAudio.volume = 1.0;
                moveToNext();
            };
        } else {
            // It's an image, wait 5 seconds then move on
            setTimeout(moveToNext, imgTime);
        }
    }

    function moveToNext() {
        currentIdx++;
        if (currentIdx < slides.length) {
            playSequence();
        } else {
            // Keep the final message on screen
            console.log("Presentation Ended");
        }
    }
</script>

</body>
</html>
