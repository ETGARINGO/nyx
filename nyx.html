<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey Home | Cinematic Tribute</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f1d592;
            --bg: #050505; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Times New Roman', serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Particles Background */
        #particles-js {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.5;
        }

        /* Lightning/Flash Effect */
        #lightning { 
            position: fixed; inset: 0; 
            background: white; z-index: 999; 
            opacity: 0; pointer-events: none; 
        }

        /* Cinematic Vignette */
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Premium Gate/Start Screen */
        #gate { 
            position: fixed; inset: 0; 
            background: linear-gradient(45deg, #000, #1a1a1a);
            z-index: 1000; display: flex; 
            align-items: center; justify-content: center; 
            transition: 2.5s cubic-bezier(0.7, 0, 0.3, 1); 
        }

        .gate-card { 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 80px; text-align: center; 
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.02);
            border-radius: 2px;
        }

        .start-btn { 
            margin-top: 40px; padding: 18px 60px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); font-size: 1rem; cursor: pointer; 
            letter-spacing: 8px; transition: 0.5s;
            text-transform: uppercase;
        }

        .start-btn:hover { 
            background: var(--gold); color: black; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); 
        }

        /* Stage & Slides */
        #stage { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
        }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; 
            transition: opacity 1.5s ease-in-out; visibility: hidden; 
        }

        .slide.active { opacity: 1; visibility: visible; }

        /* Ken Burns Effect */
        .slide img { 
            max-width: 85%; max-height: 80vh; 
            object-fit: contain; 
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
            transform: scale(1.1) translateY(0);
        }

        .slide.active img { 
            animation: kenburns 10s ease-out forwards;
        }

        @keyframes kenburns {
            from { transform: scale(1.1) translateY(0); }
            to { transform: scale(1.0) translateY(-10px); }
        }

        video { 
            max-width: 90%; max-height: 80vh; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
        }

        /* Final Message Style */
        .final-box h1 { 
            font-size: clamp(3rem, 8vw, 6rem); 
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 20px; text-transform: uppercase; 
            margin: 0;
        }

        .final-box p { 
            font-family: 'Segoe UI', sans-serif;
            font-weight: 200; letter-spacing: 4px;
            opacity: 0.6; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="lightning"></div>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3" loop></audio>

<div id="gate">
    <div class="gate-card">
        <h1 style="letter-spacing: 15px; margin: 0; font-weight: 100; color: var(--gold);">WALKING IN THE WIND</h1>
        <p style="opacity: 0.4; margin-top: 15px; letter-spacing: 3px;">A TRIBUTE TO OUR OFFICER</p>
        <button class="start-btn" onclick="ignite()">Begin the Journey</button>
    </div>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="9.JPEG"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <h1>Welcome Home</h1>
            <p>A NEW CHAPTER BEGINS IN YOUR HOMETOWN</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const lightning = document.getElementById('lightning');
    let currentIdx = 0;

    // Initialize Dust Particles
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#d4af37" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.2 },
            "size": { "value": 2 },
            "move": { "enable": true, "speed": 0.5, "direction": "top" }
        }
    });

    function ignite() {
        document.getElementById('gate').style.transform = 'scale(1.2)';
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 2500);
        
        music.volume = 0;
        music.play();
        // Fade in music
        let vol = 0;
        const fadeIn = setInterval(() => {
            if (vol < 1) { vol += 0.05; music.volume = vol; }
            else clearInterval(fadeIn);
        }, 200);

        startLightning();
        runEngine();
    }

    function startLightning() {
        const trigger = () => {
            const delay = Math.random() * 10000 + 5000;
            setTimeout(() => {
                lightning.style.opacity = '0.2';
                setTimeout(() => { lightning.style.opacity = '0'; }, 50);
                trigger();
            }, delay);
        };
        trigger();
    }

    function runEngine() {
        slides.forEach(s => s.classList.remove('active'));
        const slide = slides[currentIdx];
        slide.classList.add('active');

        // Camera Shutter Flash effect on transition
        lightning.style.opacity = '0.3';
        setTimeout(() => { lightning.style.opacity = '0'; }, 150);

        const video = slide.querySelector('video');
        if (video) {
            music.animate([{volume: music.volume}, {volume: 0.1}], {duration: 1500, fill: 'forwards'});
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                music.animate([{volume: 0.1}, {volume: 1}], {duration: 1500, fill: 'forwards'});
                advance();
            };
        } else {
            // Stay on photo for 5 seconds
            setTimeout(advance, 5000);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
