<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer's Journey - The Movie</title>
    <style>
        :root { --gold: #c6a02e; --speed: 6s; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; }
        
        /* Cinematic Film Grain Overlay */
        body::after {
            content: ""; position: fixed; inset: 0; 
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1; pointer-events: none; z-index: 50;
        }

        /* Start Screen */
        #start-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .play-btn { 
            padding: 15px 50px; font-size: 1.5rem; cursor: pointer; 
            background: transparent; border: 2px solid var(--gold); color: var(--gold);
            border-radius: 5px; text-transform: uppercase; letter-spacing: 5px; transition: 0.5s;
        }
        .play-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        /* Slideshow */
        #viewport { position: relative; width: 100vw; height: 100vh; perspective: 1000px; }
        .slide { 
            position: absolute; inset: 0; display: none; 
            align-items: center; justify-content: center; 
            opacity: 0; transform: scale(1.1) rotateY(5deg);
            transition: opacity 2s ease, transform 2s ease;
        }
        .slide.active { display: flex; opacity: 1; transform: scale(1) rotateY(0deg); }

        /* Movie Zoom Effect */
        .slide img { 
            max-width: 85%; max-height: 80vh; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            animation: kenburns var(--speed) infinite alternate ease-in-out;
        }
        @keyframes kenburns {
            from { transform: scale(1) translate(0,0); }
            to { transform: scale(1.1) translate(-1%, -1%); }
        }

        video { max-width: 90%; max-height: 85vh; outline: 1px solid var(--gold); }

        /* Text Animation */
        .farewell-box { 
            text-align: center; opacity: 0; transform: translateY(50px);
            transition: 2s all ease 1s; 
        }
        .slide.active .farewell-box { opacity: 1; transform: translateY(0); }
        
        .title-card { font-size: 4rem; color: var(--gold); letter-spacing: 8px; margin-bottom: 20px; }
        .sub-text { font-size: 1.8rem; line-height: 1.8; color: #ccc; max-width: 800px; }
    </style>
</head>
<body>

<audio id="bgMusic" src="audio.mp3" loop></audio>

<div id="start-overlay">
    <h1 style="letter-spacing: 10px; font-weight: 100; margin-bottom: 50px;">A TRIBUTE TO LEADERSHIP</h1>
    <button class="play-btn" onclick="runMovie()">Play Movie</button>
</div>

<div id="viewport">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="farewell-box">
            <h1 class="title-card">Welcome Home</h1>
            <p class="sub-text">
                Congratulations on your new assignment.<br>
                Your journey brings you back home, and though we part ways here,<br>
                your impact remains. Thank you for the memories.
            </p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    let i = 0;

    function runMovie() {
        document.getElementById('start-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('start-overlay').style.display = 'none', 1000);
        music.play();
        showSlide();
    }

    function showSlide() {
        slides.forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        
        const current = slides[i];
        current.style.display = 'flex';
        setTimeout(() => current.classList.add('active'), 50);

        const vid = current.querySelector('video');
        if (vid) {
            music.volume = 0.1; // Duck audio for video
            vid.play();
            vid.onended = () => { music.volume = 1; next(); };
        } else {
            setTimeout(next, 5000); // Show image for 5 seconds
        }
    }

    function next() {
        if (i < slides.length - 1) {
            i++;
            showSlide();
        }
    }
</script>

</body>
</html>
