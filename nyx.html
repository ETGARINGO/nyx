<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribute to Miss Nyx Postrano</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.5);
            --bg: #050505; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Floating Atmosphere */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.35; }
        
        /* Camera Shutter Flash */
        #shutter { 
            position: fixed; inset: 0; 
            background: white; z-index: 999; 
            opacity: 0; pointer-events: none; 
        }

        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.95) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Premium Intro Gate */
        #gate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1000; display: flex; 
            align-items: center; justify-content: center; 
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .gate-card { 
            text-align: center; padding: 70px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .start-btn { 
            margin-top: 40px; padding: 18px 65px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); font-size: 1rem; cursor: pointer; 
            letter-spacing: 7px; transition: 0.5s; text-transform: uppercase;
        }

        .start-btn:hover { 
            background: var(--gold); color: black; 
            box-shadow: 0 0 50px var(--gold-glow); 
        }

        /* Slide Engine */
        #stage { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
        }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 1.8s ease-in-out; visibility: hidden; 
        }

        .slide.active { opacity: 1; visibility: visible; }

        /* Smooth Cinematic Motion */
        .slide img { 
            max-width: 80%; max-height: 80vh; 
            object-fit: contain; 
            filter: drop-shadow(0 10px 50px rgba(0,0,0,1));
            transform: scale(1.1);
        }

        .slide.active img { 
            animation: kenburns 10s linear forwards; 
        }

        @keyframes kenburns {
            from { transform: scale(1.12) translateY(10px); }
            to { transform: scale(1.0) translateY(-10px); }
        }

        video { 
            max-width: 85%; max-height: 85vh; 
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        /* Final Dedicated Message */
        .final-box h1 { 
            font-size: clamp(2.5rem, 6vw, 5.5rem); 
            letter-spacing: 12px; 
            text-transform: uppercase;
            background: linear-gradient(to bottom, #f1d592, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 0 20px var(--gold-glow));
        }
        
        .final-box p { 
            font-family: 'Segoe UI', sans-serif; 
            letter-spacing: 4px; 
            opacity: 0.5; 
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="shutter"></div>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3" loop></audio>

<div id="gate">
    <div class="gate-card">
        <h1 style="letter-spacing: 14px; font-weight: 100; color: var(--gold); margin-bottom: 5px;">WALKING IN THE WIND</h1>
        <p style="opacity: 0.6; font-size: 1.1rem; letter-spacing: 5px; color: white;">A TRIBUTE TO</p>
        <h2 style="font-size: 2.8rem; color: var(--gold); margin: 15px 0; letter-spacing: 3px;">MISS NYX POSTRANO</h2>
        <button class="start-btn" onclick="ignite()">Begin the Journey</button>
    </div>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV" muted></video></div>
    <div class="slide"><video src="3.MOV" muted></video></div>
    <div class="slide"><video src="4.MOV" muted></video></div>

    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p>Welcome Home</p>
            <h1>MISS NYX POSTRANO</h1>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const shutter = document.getElementById('shutter');
    let currentIdx = 0;

    // Golden Floating Dust Effect
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 90 },
            "color": { "value": "#d4af37" },
            "opacity": { "value": 0.3 },
            "size": { "value": 1.5 },
            "move": { "enable": true, "speed": 0.6, "direction": "top" }
        }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        document.getElementById('gate').style.transform = 'scale(1.15)';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 2500);
        
        music.volume = 0;
        music.play();
        // Fade in music smoothly
        let vol = 0;
        let fade = setInterval(() => {
            if (vol < 1) { vol += 0.05; music.volume = vol; }
            else clearInterval(fade);
        }, 150);

        runEngine();
    }

    function triggerFlash() {
        shutter.style.opacity = '0.4';
        setTimeout(() => { shutter.style.opacity = '0'; }, 200);
    }

    function runEngine() {
        slides.forEach(s => s.classList.remove('active'));
        const slide = slides[currentIdx];
        slide.classList.add('active');
        triggerFlash();

        const video = slide.querySelector('video');
        if (video) {
            // Lower music for video
            music.animate([{volume: 1}, {volume: 0.1}], {duration: 1200, fill: 'forwards'});
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                music.animate([{volume: 0.1}, {volume: 1}], {duration: 1200, fill: 'forwards'});
                advance();
            };
        } else {
            // Each photo stays for 6 seconds
            setTimeout(advance, 6000);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
