<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer Tribute - Welcome Home</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; }
        
        /* Start Button Screen */
        #overlay { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 60px; font-size: 1.8rem; cursor: pointer; background: #d4af37; border: none; border-radius: 50px; color: #000; font-weight: bold; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); transition: 0.4s; }
        .start-btn:hover { background: #fff; transform: scale(1.1); }

        /* Slide Engine */
        .container { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 2s ease-in-out; }
        .slide.active { opacity: 1; visibility: visible; }

        /* Ken Burns Animation */
        .slide img { 
            max-width: 90%; max-height: 85vh; 
            border: 2px solid #333;
            transform: scale(1);
            transition: transform 7s linear; 
        }
        .slide.active img { transform: scale(1.15); }
        
        video { max-width: 95%; max-height: 90vh; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        /* Closing Tribute Text */
        .farewell-box { text-align: center; border: 2px solid #d4af37; padding: 50px; background: rgba(0,0,0,0.7); border-radius: 20px; }
        .gold { color: #d4af37; font-size: 4rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 4px; }
        .message { font-size: 2rem; line-height: 1.5; font-style: italic; color: #ddd; }
    </style>
</head>
<body>

<video id="bgAudio" style="display:none;"><source src="vidaudio.mp4" type="video/mp4"></video>

<div id="overlay">
    <h1 style="margin-bottom:40px; letter-spacing:2px;">OFFICER SURPRISE PRESENTATION</h1>
    <button class="start-btn" onclick="start()">START THE TRIBUTE</button>
</div>

<div class="container">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="farewell-box">
            <div class="gold">Welcome Home</div>
            <p class="message">
                Congratulations on your new assignment.<br>
                While we will miss you here, we are so happy<br>
                that you are finally returning to your hometown.<br>
                Thank you for the memories and your leadership.
            </p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const bgAudio = document.getElementById('bgAudio');
    let index = 0;
    const imgDuration = 5500; // 5.5 seconds per image

    function start() {
        document.getElementById('overlay').style.display = 'none';
        bgAudio.play();
        playLoop();
    }

    function playLoop() {
        slides.forEach(s => s.classList.remove('active'));
        const current = slides[index];
        current.classList.add('active');

        const vid = current.querySelector('video');
        
        if (vid) {
            bgAudio.volume = 0.2; // Dim background music
            vid.play();
            vid.onended = () => {
                bgAudio.volume = 1.0; // Restore background music
                nextSlide();
            };
        } else {
            setTimeout(nextSlide, imgDuration);
        }
    }

    function nextSlide() {
        index++;
        if (index < slides.length) {
            playLoop();
        } else {
            // Stop on the final farewell message
            console.log("Presentation Complete");
        }
    }
</script>

</body>
</html>
