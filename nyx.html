<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer's Homecoming Tribute</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Georgia', serif; overflow: hidden; height: 100%; }

        /* Movie Visual Effects */
        .film-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 2px, 3px 100%; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 30%, black 150%); z-index: 11; pointer-events: none; }

        /* Start Button Screen */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.5s; }
        .gate-content { text-align: center; border: 1px solid var(--gold); padding: 50px; border-radius: 10px; }
        .start-btn { margin-top: 30px; padding: 15px 40px; background: var(--gold); border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; letter-spacing: 2px; }

        /* Slide Engine */
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; inset: 0; opacity: 0; display: flex; align-items: center; justify-content: center; transition: opacity 2s ease-in-out; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; }

        /* Animated Image Motion (Outing Style) */
        .slide img { 
            max-width: 85%; max-height: 80vh; border: 2px solid #222; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: scale(1.1) translateX(-20px);
            transition: transform 7s linear;
        }
        .slide.active img { transform: scale(1) translateX(0px); }
        
        video { max-width: 90%; max-height: 85vh; border: 1px solid var(--gold); }

        /* Final Farewell Box */
        .final-box { text-align: center; padding: 40px; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); max-width: 800px; }
        .final-box h1 { font-size: 4rem; color: var(--gold); margin-bottom: 20px; letter-spacing: 5px; }
        .final-box p { font-size: 1.8rem; line-height: 1.6; font-style: italic; }
    </style>
</head>
<body>

<audio id="bgMusic" src="audio.mp3" loop></audio>

<div id="gate">
    <div class="gate-content">
        <h1 style="letter-spacing: 5px; color: var(--gold);">THE JOURNEY HOME</h1>
        <p style="opacity: 0.7;">A surprise presentation for our Officer</p>
        <button class="start-btn" onclick="startPresentation()">START MOVIE</button>
    </div>
</div>

<div class="film-overlay"></div>
<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>

    <div class="slide">
        <div class="final-box">
            <h1>Welcome Home</h1>
            <p>Congratulations on your new assignment.<br>
            While we will deeply miss your leadership and friendship here,<br>
            we are overjoyed that you are finally returning to your hometown.<br>
            Thank you for the memories and your service.</p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    let i = 0;

    function startPresentation() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 1500);
        music.play();
        playNext();
    }

    function playNext() {
        slides.forEach(s => s.classList.remove('active'));
        const current = slides[i];
        current.classList.add('active');

        const video = current.querySelector('video');
        if (video) {
            music.volume = 0.1; // Duck background music for video
            video.currentTime = 0;
            video.play();
            video.onended = () => { music.volume = 1; nextSlide(); };
        } else {
            setTimeout(nextSlide, 5000); // Show image for 5 seconds
        }
    }

    function nextSlide() {
        if (i < slides.length - 1) {
            i++;
            playNext();
        }
    }
</script>
</body>
</html>
