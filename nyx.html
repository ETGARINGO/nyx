<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribute | Miss Nyx Postrano</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #050505; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Cinematic Overlays */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.3; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%); z-index: 10; pointer-events: none; }
        #shutter { position: fixed; inset: 0; background: white; z-index: 999; opacity: 0; pointer-events: none; }

        /* Dynamic Lyric Subtitles */
        #lyric-container {
            position: fixed;
            bottom: 10%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .subtitle-text {
            font-size: 2rem;
            font-style: italic;
            letter-spacing: 2px;
            color: white;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
            opacity: 0;
            filter: blur(10px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            padding: 10px 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .subtitle-text.active {
            opacity: 1;
            filter: blur(0px);
            transform: translateY(-15px);
        }

        /* Intro Screen */
        #gate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1000; display: flex; 
            align-items: center; justify-content: center; 
            transition: 2s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .gate-card { 
            text-align: center; padding: 60px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(15px);
        }

        .start-btn { 
            margin-top: 30px; padding: 18px 60px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); font-size: 1.1rem; cursor: pointer; 
            letter-spacing: 6px; transition: 0.5s; text-transform: uppercase;
        }

        .start-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 40px var(--gold-glow); }

        /* Slideshow Engine */
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; inset: 0; opacity: 0; display: flex; align-items: center; justify-content: center; transition: opacity 1.5s ease-in-out; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; }

        .slide img { 
            max-width: 85%; max-height: 80vh; 
            object-fit: contain; 
            filter: drop-shadow(0 0 50px black);
            transform: scale(1.1);
        }

        .slide.active img { animation: kenburns 5.5s linear forwards; }

        @keyframes kenburns {
            from { transform: scale(1.1) rotate(0.01deg); }
            to { transform: scale(1.0) translateY(-10px) rotate(0.01deg); }
        }

        video { max-width: 85%; max-height: 80vh; border: 1px solid var(--gold); box-shadow: 0 0 50px black; }

        .final-box h1 { 
            font-size: 4.5rem; letter-spacing: 15px; text-transform: uppercase;
            background: linear-gradient(to bottom, #f1d592, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="shutter"></div>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<div id="gate">
    <div class="gate-card">
        <h1 style="letter-spacing: 12px; color: var(--gold); margin-bottom: 10px;">WALKING IN THE WIND</h1>
        <p style="opacity: 0.5; letter-spacing: 5px;">A CINEMATIC TRIBUTE TO</p>
        <h2 style="font-size: 2.8rem; color: var(--gold); margin: 15px 0;">MISS NYX POSTRANO</h2>
        <button class="start-btn" onclick="ignite()">Begin Journey</button>
    </div>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV" muted></video></div>
    <div class="slide"><video src="3.MOV" muted></video></div>
    <div class="slide"><video src="4.MOV" muted></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p style="letter-spacing: 12px; margin-bottom: 20px;">WELCOME HOME</p>
            <h1>MISS NYX POSTRANO</h1>
            <p style="opacity: 0.8; margin-top: 20px; font-size: 1.2rem; letter-spacing: 2px;">
                She will be transitioning to her home assignment from this unit.
            </p>
            <p style="opacity: 0.5; margin-top: 10px;">Your new chapter begins today.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const shutter = document.getElementById('shutter');
    const subtitle = document.getElementById('subtitle');
    let currentIdx = 0;

    // Full Lyrics Timeline (Synced to "Walking in the Wind")
    const lyrics = [
        { time: 2, text: "A week ago you said to me..." },
        { time: 7, text: "Do you believe I'll ever be back?" },
        { time: 13, text: "And I told you, I was sure of it." },
        { time: 20, text: "Walking in the wind..." },
        { time: 28, text: "We carry your stories with us." },
        { time: 35, text: "Miss Nyx, welcome home." },
        { time: 50, text: "Every step you took led here." },
        { time: 75, text: "A journey of dedication." },
        { time: 100, text: "To the peace you've helped build." },
        { time: 130, text: "Your hometown awaits." },
        { time: 160, text: "The wind is at your back." },
        { time: 190, text: "Welcome Home, Miss Nyx Postrano." }
    ];

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 70 },
            "color": { "value": "#d4af37" },
            "opacity": { "value": 0.2 },
            "size": { "value": 1.5 },
            "move": { "enable": true, "speed": 0.8, "direction": "top" }
        }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        document.getElementById('gate').style.transform = 'scale(1.1)';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 2000);
        
        music.play();
        runEngine();
        
        // Precise Lyric Monitor
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.find((l, i) => 
                current >= l.time && (!lyrics[i+1] || current < lyrics[i+1].time)
            );
            
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 400);
            }
        };
    }

    function runEngine() {
        slides.forEach(s => s.classList.remove('active'));
        const slide = slides[currentIdx];
        slide.classList.add('active');
        
        // Shutter Flash
        shutter.style.opacity = '0.35';
        setTimeout(() => { shutter.style.opacity = '0'; }, 200);

        const video = slide.querySelector('video');
        if (video) {
            // Duck music volume for videos
            music.animate([{volume: 1}, {volume: 0.15}], {duration: 1000, fill: 'forwards'});
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                music.animate([{volume: 0.15}, {volume: 1}], {duration: 1000, fill: 'forwards'});
                advance();
            };
        } else {
            // Timing: 202 seconds / 39 slides = ~5.1 seconds per slide
            setTimeout(advance, 5100);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
