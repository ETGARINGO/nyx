<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribute | Miss Nyx Postrano</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #050505; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Particles & Atmosphere */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.3; }
        
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Cinematic Shutter Flash */
        #shutter { 
            position: fixed; inset: 0; 
            background: white; z-index: 999; 
            opacity: 0; pointer-events: none; 
        }

        /* Lyrics Layer */
        #lyric-container {
            position: fixed;
            bottom: 12%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .lyric-text {
            font-size: 1.8rem;
            font-style: italic;
            letter-spacing: 2px;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            opacity: 0;
            filter: blur(10px);
            transition: all 0.8s ease;
        }

        .lyric-text.active {
            opacity: 1;
            filter: blur(0px);
            transform: translateY(-10px);
        }

        /* Intro Screen */
        #gate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1000; display: flex; 
            align-items: center; justify-content: center; 
            transition: 2s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .gate-card { 
            text-align: center; padding: 60px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(15px);
        }

        .start-btn { 
            margin-top: 30px; padding: 18px 60px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); font-size: 1rem; cursor: pointer; 
            letter-spacing: 6px; transition: 0.5s; text-transform: uppercase;
        }

        .start-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 40px var(--gold-glow); }

        /* Stage Engine */
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 1.5s ease-in-out; visibility: hidden; 
        }

        .slide.active { opacity: 1; visibility: visible; }

        .slide img { 
            max-width: 85%; max-height: 80vh; 
            object-fit: contain; 
            filter: drop-shadow(0 0 50px black);
            transform: scale(1.1);
        }

        .slide.active img { animation: kenburns 12s linear forwards; }

        @keyframes kenburns {
            from { transform: scale(1.1) rotate(0.01deg); }
            to { transform: scale(1.0) translateY(-15px) rotate(0.01deg); }
        }

        video { max-width: 85%; max-height: 80vh; border: 1px solid rgba(212, 175, 55, 0.2); }

        .final-box h1 { 
            font-size: 4rem; letter-spacing: 15px; text-transform: uppercase;
            background: linear-gradient(to bottom, #f1d592, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="shutter"></div>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="lyric-container">
    <div id="lyric-text" class="lyric-text"></div>
</div>

<div id="gate">
    <div class="gate-card">
        <h1 style="letter-spacing: 10px; color: var(--gold); margin-bottom: 5px;">WALKING IN THE WIND</h1>
        <p style="opacity: 0.5; letter-spacing: 4px;">A TRIBUTE TO</p>
        <h2 style="font-size: 2.5rem; color: var(--gold); margin: 10px 0;">MISS NYX POSTRANO</h2>
        <button class="start-btn" onclick="ignite()">Begin Journey</button>
    </div>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV" muted></video></div>
    <div class="slide"><video src="3.MOV" muted></video></div>

    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>

    <div class="slide"><img src="31.JPG"></div>

    <div class="slide"><img src="111.jpg"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p style="letter-spacing: 10px;">WELCOME HOME</p>

            <p>Your new chapter begins now.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const shutter = document.getElementById('shutter');
    const lyricEl = document.getElementById('lyric-text');
    let currentIdx = 0;

    // --- LYRIC SYNC DATA ---
    // Adjust 'time' (seconds) to match the song's vocals exactly
    const lyrics = [
        { time: 2, text: "A tribute to our beloved officer" },
        { time: 6, text: "Miss Nyx Postrano" },
        { time: 12, text: "You'll find your way home..." },
        { time: 16, text: "Walking in the wind" },
        { time: 20, text: "We carry your stories with us" },
        { time: 25, text: "The journey is just beginning" },
        { time: 30, text: "A new chapter unfolds" }
        // Add more lyrics here...
    ];

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 60 },
            "color": { "value": "#d4af37" },
            "opacity": { "value": 0.2 },
            "size": { "value": 2 },
            "move": { "enable": true, "speed": 1, "direction": "top" }
        }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        document.getElementById('gate').style.transform = 'scale(1.1)';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 2000);
        
        music.play();
        runEngine();
        
        // Lyric Sync Monitor
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.find((l, i) => 
                current >= l.time && (!lyrics[i+1] || current < lyrics[i+1].time)
            );
            
            if (active && lyricEl.innerText !== active.text) {
                lyricEl.classList.remove('active');
                setTimeout(() => {
                    lyricEl.innerText = active.text;
                    lyricEl.classList.add('active');
                }, 400);
            }
        };
    }

    function runEngine() {
        slides.forEach(s => s.classList.remove('active'));
        const slide = slides[currentIdx];
        slide.classList.add('active');
        
        // Shutter Flash
        shutter.style.opacity = '0.4';
        setTimeout(() => { shutter.style.opacity = '0'; }, 200);

        const video = slide.querySelector('video');
        if (video) {
            music.animate([{volume: 1}, {volume: 0.15}], {duration: 1000, fill: 'forwards'});
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                music.animate([{volume: 0.15}, {volume: 1}], {duration: 1000, fill: 'forwards'});
                advance();
            };
        } else {
            // Photos stay for 6.5s to keep pace with a ballad
            setTimeout(advance, 6500);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
