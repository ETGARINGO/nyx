<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer Tribute - Farewell & Welcome Home</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Start Overlay */
        #start-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 50px; font-size: 28px; cursor: pointer; background: #c6a02e; border: none; border-radius: 50px; color: white; font-weight: bold; box-shadow: 0 0 20px rgba(198, 160, 46, 0.5); transition: 0.3s; }
        .start-btn:hover { transform: scale(1.1); background: #e2ba46; }

        /* Slideshow Container */
        #slideshow { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.active { display: flex; opacity: 1; }

        /* Cinematic Zoom Animation */
        .slide img { 
            max-width: 90%; max-height: 85vh; 
            border: 4px solid #222; 
            border-radius: 4px;
            transform: scale(1);
            transition: transform 6s linear; 
        }
        .slide.active img { transform: scale(1.1); }
        
        video { max-width: 90%; max-height: 85vh; border: 2px solid #c6a02e; }

        /* Farewell Text Box */
        .farewell-text { text-align: center; padding: 60px; background: rgba(0,0,0,0.85); border: 3px solid #c6a02e; border-radius: 20px; max-width: 800px; }
        h1.gold-title { color: #c6a02e; font-size: 3.5rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 3px; }
        p.message { font-size: 2rem; line-height: 1.6; color: #f0f0f0; font-style: italic; }
    </style>
</head>
<body>

<audio id="bgMusic" src="audio.mp3" loop></audio>

<div id="start-overlay">
    <h1 style="margin-bottom: 30px; letter-spacing: 2px;">OFFICER SURPRISE TRIBUTE</h1>
    <button class="start-btn" onclick="startShow()">BEGIN PRESENTATION</button>
</div>

<div id="slideshow">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>
    
    <div class="slide">
        <div class="farewell-text">
            <h1 class="gold-title">Welcome Home!</h1>
            <p class="message">Congratulations on your new assignment.<br><br>
            While we will deeply miss your leadership and friendship here, 
            we are overjoyed that your journey is leading you back home.<br><br>
            Thank you for your service and the memories we’ve shared.</p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    let i = 0;
    const imgTime = 5000; // Time in milliseconds for each image (5 seconds)

    function startShow() {
        document.getElementById('start-overlay').style.display = 'none';
        music.play();
        showNext();
    }

    function showNext() {
        slides.forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });

        const current = slides[i];
        current.style.display = 'flex';
        
        // Timeout allows the display:flex to register so the opacity transition works
        setTimeout(() => {
            current.classList.add('active');
        }, 50);

        const video = current.querySelector('video');
        if (video) {
            music.volume = 0.15; // Lower music for video
            video.currentTime = 0;
            video.play();
            video.onended = () => { 
                music.volume = 1.0; 
                next(); 
            };
        } else {
            setTimeout(next, imgTime);
        }
    }

    function next() {
        if (i < slides.length - 1) {
            i++;
            showNext();
        } else {
            // Stop at the last farewell slide
            console.log("Presentation Finished");
        }
    }
</script>
</body>
</html>
