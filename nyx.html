<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Homecoming Tribute</title>
    <style>
        :root { --accent: #d4af37; --bg: #050505; --text: #f5f5f5; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Times New Roman', serif; overflow: hidden; height: 100%; }

        /* Cinematic Overlays */
        .overlay-vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); z-index: 10; pointer-events: none; }
        .light-leak { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%); animation: moveLeak 20s infinite alternate; z-index: 11; pointer-events: none; }

        @keyframes moveLeak { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        /* Entrance Screen */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 2s; }
        .gate-title { letter-spacing: 12px; font-size: 1.5rem; margin-bottom: 40px; opacity: 0.8; }
        .start-btn { padding: 15px 60px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; letter-spacing: 4px; transition: 0.5s; }
        .start-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 40px rgba(212,175,55,0.3); }

        /* Presentation Stage */
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; inset: 0; opacity: 0; display: flex; align-items: center; justify-content: center; transition: opacity 2.5s ease; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; }

        /* Dynamic Motion Effects */
        .slide img { max-width: 80%; max-height: 80vh; border: 1px solid rgba(255,255,255,0.1); filter: contrast(1.1); transform: scale(1.2); transition: transform 8s linear; }
        .slide.active img { transform: scale(1.0); } /* Pull-back zoom effect */
        
        /* Video Styling */
        video { max-width: 90%; max-height: 85vh; outline: 1px solid var(--accent); box-shadow: 0 0 60px rgba(0,0,0,0.9); }

        /* Final Message styling */
        .credits { text-align: center; max-width: 800px; padding: 40px; }
        .credits h1 { font-size: 4rem; color: var(--accent); font-weight: 100; margin-bottom: 20px; letter-spacing: 5px; }
        .credits p { font-size: 1.8rem; line-height: 1.8; opacity: 0.9; font-style: italic; }
    </style>
</head>
<body>

<audio id="masterAudio" src="audio.mp3" loop></audio>

<div id="gate">
    <div class="gate-title">A SPECIAL TRIBUTE</div>
    <button class="start-btn" onclick="ignite()">PLAY FILM</button>
</div>

<div class="overlay-vignette"></div>
<div class="light-leak"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="credits">
            <h1>Welcome Home</h1>
            <p>Congratulations on your new assignment.<br>
            The road back home is the sweetest one of all.<br>
            Thank you for being part of our team and for leaving us better than you found us.</p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const audio = document.getElementById('masterAudio');
    let idx = 0;

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 2000);
        audio.play();
        playSequence();
    }

    function playSequence() {
        slides.forEach(s => s.classList.remove('active'));
        const current = slides[idx];
        current.classList.add('active');

        const video = current.querySelector('video');
        if (video) {
            audio.animate([{volume: audio.volume}, {volume: 0.1}], {duration: 1000, fill: 'forwards'});
            video.currentTime = 0;
            video.play();
            video.onended = () => {
                audio.animate([{volume: 0.1}, {volume: 1.0}], {duration: 1000, fill: 'forwards'});
                next();
            };
        } else {
            setTimeout(next, 6000); // 6 seconds per photo for a slow, cinematic feel
        }
    }

    function next() {
        if (idx < slides.length - 1) {
            idx++;
            playSequence();
        }
    }
</script>

</body>
</html>
