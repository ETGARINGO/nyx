<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farewell & Tribute - Officer Presentation</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Start Overlay */
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #c6a02e; border: none; border-radius: 8px; color: white; font-weight: bold; }
        
        /* Slides */
        .slide { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.5s; }
        .slide.active { display: flex; opacity: 1; }
        img, video { max-width: 90%; max-height: 85vh; border: 3px solid #333; border-radius: 5px; }
        
        /* Farewell Message Styling */
        .farewell-text { text-align: center; padding: 40px; background: rgba(0,0,0,0.8); border: 2px solid #c6a02e; border-radius: 15px; }
        h1 { color: #c6a02e; font-size: 3rem; margin-bottom: 20px; }
        p { font-size: 1.8rem; line-height: 1.5; color: #eee; }
    </style>
</head>
<body>

<audio id="bgMusic" src="music.mp3" loop></audio>

<div id="start-overlay">
    <h1>Officer Tribute</h1>
    <button class="start-btn" onclick="startShow()">Begin Presentation</button>
</div>

<div id="slideshow">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>
    
    <div class="slide">
        <div class="farewell-text">
            <h1>Farewell & Best Wishes</h1>
            <p>Congratulations on your new assignment.<br>
            While we will deeply miss your leadership and friendship here,<br>
            we are overjoyed that your journey is leading you back home.<br>
            Thank you for your service and the memories we’ve shared.</p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    let i = 0;

    function startShow() {
        document.getElementById('start-overlay').style.display = 'none';
        music.play();
        showNext();
    }

    function showNext() {
        slides.forEach(s => s.classList.remove('active'));
        const current = slides[i];
        current.classList.add('active');

        const video = current.querySelector('video');
        if (video) {
            music.volume = 0.2;
            video.play();
            video.onended = () => { music.volume = 1; next(); };
        } else {
            setTimeout(next, 4000);
        }
    }

    function next() {
        i = (i + 1) % slides.length;
        showNext();
    }
</script>
</body>
</html>
