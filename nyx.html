<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Journey Home | Lightning Edition</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Georgia', serif; overflow: hidden; height: 100%; }

        /* Lightning Effect */
        .lightning { position: fixed; inset: 0; background: white; z-index: 99; opacity: 0; pointer-events: none; }
        @keyframes flash { 0% { opacity: 0; } 5% { opacity: 0.8; } 10% { opacity: 0; } 15% { opacity: 0.5; } 20% { opacity: 0; } }
        .flash-it { animation: flash 0.8s ease-out; }

        /* Cinematic Visuals */
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 30%, black 150%); z-index: 10; pointer-events: none; }
        
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 2s; }
        .start-btn { padding: 20px 60px; background: var(--gold); border: none; font-size: 1.5rem; cursor: pointer; letter-spacing: 5px; font-weight: bold; }

        #stage { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; inset: 0; opacity: 0; display: flex; align-items: center; justify-content: center; transition: opacity 2s ease; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; }

        /* Auto-Fit Images */
        .slide img { max-width: 95%; max-height: 90vh; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        video { max-width: 95%; max-height: 90vh; outline: 1px solid var(--gold); }

        .final-box { text-align: center; }
        .final-box h1 { font-size: 4rem; color: var(--gold); }
    </style>
</head>
<body>

<div class="lightning" id="storm"></div>
<audio id="bgMusic" src="audio.mp3" loop></audio>

<div id="gate">
    <h1 style="color:var(--gold); letter-spacing: 10px;">THE JOURNEY HOME</h1>
    <button class="start-btn" onclick="startAll()">PLAY FILM</button>
</div>

<div class="vignette"></div>

<div id="stage">
    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><video src="2.MOV"></video></div>
    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div>
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div>
    <div class="slide"><img src="24.JPEG"></div>
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><video src="3.MOV"></video></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><video src="4.MOV"></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>
    <div class="slide"><img src="8.JPEG"></div>
    <div class="slide"><img src="9.JPEG"></div>

    <div class="slide">
        <div class="final-box">
            <h1>Welcome Home</h1>
            <p>Congratulations on your new assignment.</p>
        </div>
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const storm = document.getElementById('storm');
    let i = 0;

    function startAll() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 1000);
        music.play();
        playSequence();
        // Random Lightning Generator
        setInterval(() => {
            if(Math.random() > 0.8) {
                storm.classList.add('flash-it');
                setTimeout(() => storm.classList.remove('flash-it'), 800);
            }
        }, 5000);
    }

    function playSequence() {
        slides.forEach(s => s.classList.remove('active'));
        const current = slides[i];
        current.classList.add('active');

        const video = current.querySelector('video');
        if (video) {
            music.volume = 0.2;
            video.play();
            video.onended = () => { music.volume = 1; next(); };
        } else {
            setTimeout(next, 7000);
        }
    }

    function next() {
        if (i < slides.length - 1) { i++; playSequence(); }
    }
</script>
</body>
</html>
