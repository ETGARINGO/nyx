<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX POSTRANO | TACTICAL HUD V7</title>
    <link rel="icon" type="image/png" href="10.JPEG">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.6);
            --bg: #020408; 
            --police-blue: #0072ff;
            --panel-bg: rgba(2, 6, 12, 0.9);
            --alert-red: #ff003c;
            --font-main: 'Rajdhani', sans-serif;
            --font-hud: 'Share Tech Mono', monospace;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: var(--font-main); overflow: hidden; height: 100vh;
        }

        /* Tactical Grid & Scanline Effects */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 114, 255, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 114, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 1;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 9999; position: fixed;
            background: linear-gradient(0deg, rgba(0, 114, 255, 0) 0%, rgba(0, 114, 255, 0.1) 50%, rgba(0, 114, 255, 0) 100%);
            opacity: 0.1; top: -100px; animation: scan 8s linear infinite; pointer-events: none;
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        /* HUD Components */
        #nav-icon {
            position: fixed; top: 30px; left: 30px; z-index: 1100;
            width: 80px; height: 80px; border: 2px solid var(--gold);
            cursor: pointer; background: black; overflow: hidden;
            box-shadow: 0 0 25px var(--gold-glow); transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: none; clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
        }
        #nav-icon img { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.2); }
        #nav-icon:hover { transform: scale(1.1); filter: contrast(1.2); }

        #recordPanel {
            position: absolute; bottom: 10%; left: 350px;
            background: var(--panel-bg); border-left: 4px solid var(--gold);
            padding: 25px; width: 350px; z-index: 500;
            backdrop-filter: blur(15px); border-radius: 0 10px 10px 0;
            opacity: 0; transform: translateX(-30px); transition: 0.8s;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #recordPanel.active { opacity: 1; transform: translateX(0); }
        #recordPanel h3 { margin: 0; color: var(--gold); font-family: 'Oswald'; letter-spacing: 2px; font-size: 1.3rem; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 5px; }
        #recordPanel p { margin: 8px 0; font-family: var(--font-hud); font-size: 0.9rem; color: #aab; }

        /* Main Layout */
        #main-layout {
            display: grid; grid-template-columns: 320px 1fr;
            height: 100vh; gap: 20px; padding: 25px; box-sizing: border-box;
            z-index: 20; position: relative;
        }

        #sidebar {
            background: rgba(0, 5, 15, 0.8); border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            scrollbar-width: none; mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
        }

        .thumb-link {
            width: 100%; height: 100px; border: 1px solid #1a202c;
            background: #000; cursor: pointer; transition: 0.3s;
            overflow: hidden; position: relative;
        }
        .thumb-link::after { content: "DATA_" attr(data-index); position: absolute; bottom: 2px; right: 5px; font-size: 9px; color: var(--gold); font-family: var(--font-hud); }
        .thumb-link:hover { border-color: var(--gold); }
        .thumb-link.active { border: 2px solid var(--gold); box-shadow: inset 0 0 15px var(--gold-glow); }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; transition: 0.5s; }
        .thumb-link.active img { opacity: 1; filter: saturate(1.2); }

        #stage {
            position: relative; background: radial-gradient(circle, #0a1128 0%, #020408 100%);
            border: 1px solid rgba(0, 114, 255, 0.2); display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: inset 0 0 100px #000;
        }

        .slide {
            position: absolute; inset: 0; opacity: 0; display: flex; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1); transform: scale(1.1); pointer-events: none;
        }
        .slide.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .slide img, .slide video { max-width: 90%; max-height: 80vh; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* Overlays */
        .hot-seat-overlay {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: var(--alert-red); color: white; padding: 12px 35px;
            font-family: 'Oswald'; border: 2px solid white; font-size: 1.8rem;
            letter-spacing: 2px; z-index: 600; display: none; animation: flash 0.5s infinite;
        }

        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; transform: translateX(-50%) scale(0.98); } }

        #lyric-container { position: fixed; bottom: 40px; right: 40px; text-align: right; z-index: 1000; pointer-events: none; }
        .subtitle-text { font-family: 'Oswald'; font-size: 2.8rem; color: var(--gold); text-transform: uppercase; line-height: 1; }

        /* Gate */
        #gate { position: fixed; inset: 0; background: radial-gradient(circle, #050a15, #000); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .gate-card { border: 1px solid var(--gold); padding: 50px; background: rgba(0,0,0,0.8); text-align: center; position: relative; }
        .gate-card::before { content: ""; position: absolute; inset: -10px; border: 1px solid var(--gold); opacity: 0.2; }
        .start-btn { 
            background: var(--gold); color: black; padding: 15px 45px; border: none; cursor: pointer; 
            font-family: 'Oswald'; font-weight: bold; font-size: 1.5rem; margin-top: 30px;
            letter-spacing: 5px; transition: 0.3s;
        }
        .start-btn:hover { background: white; box-shadow: 0 0 30px white; }

        .final-box h1 { font-family: 'Oswald'; font-size: 5rem; color: var(--gold); margin: 0; }
    </style>
</head>
<body>

<div class="scanline"></div>
<div id="nav-icon" onclick="jumpTo(0)"><img src="10.JPEG"></div>
<div id="particles-js" style="position:fixed; inset:0; z-index:2;"></div>

<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="gate">
    <div class="gate-card">
        <h1 style="color: var(--gold); margin:0; font-family: 'Oswald'; font-size: 3.5rem; letter-spacing: 10px;">PRO9 COMMAND</h1>
        <p style="letter-spacing: 4px; color: #889; font-size: 1rem; margin-top: 10px;">SECURE PROTOCOL: PCPT POSTRANO</p>
        <button class="start-btn" onclick="ignite()">INITIALIZE HUD</button>
    </div>
</div>

<div id="main-layout">
    <div id="sidebar"></div>
    <div id="stage">
        <div id="hotSeatTag" class="hot-seat-overlay">SYSTEM ALERT: HOT SEAT ⚠️</div>

        <div id="recordPanel">
            <h3 id="typingName">FILE: BATOY_N_P</h3>
            <p>RANK: POLICE CAPTAIN</p>
            <p>ROLE: USHERETTE SUPERVISOR</p>
            <p>LOCATION: RPRMD IX</p>
            <p style="color:var(--alert-red)">STATUS: RELOCATING...</p>
        </div>

        <div id="slide-container"></div>
    </div>
</div>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const mediaFiles = [
        {type: 'img', src: '1.JPG'}, {type: 'vid', src: '2.MOV'}, {type: 'vid', src: '3.MOV'},
        {type: 'vid', src: '4.MOV'}, {type: 'img', src: '5.JPEG'}, {type: 'img', src: '6.JPEG'},
        {type: 'img', src: '7.JPEG'}, {type: 'img', src: '8.JPEG'}, {type: 'img', src: '9.JPEG'},
        {type: 'img', src: '10.JPEG'}, {type: 'img', src: '11.JPEG'}, {type: 'img', src: '12.JPEG'},
        {type: 'img', src: '13.JPEG'}, {type: 'img', src: '14.JPEG'}, {type: 'img', src: '15.JPEG'},
        {type: 'img', src: '16.JPEG'}, {type: 'img', src: '17.JPEG'}, {type: 'img', src: '18.JPG'},
        {type: 'img', src: '19.JPG'}, {type: 'img', src: '20.JPG'}, {type: 'img', src: '21.JPEG'},
        {type: 'img', src: '22.JPEG'}, {type: 'img', src: '23.JPEG'}, {type: 'img', src: '24.JPEG'},
        {type: 'img', src: '25.JPG'}, {type: 'img', src: '26.JPG'}, {type: 'img', src: '27.JPG'},
        {type: 'img', src: '28.JPG'}, {type: 'img', src: '29.JPG'}, {type: 'img', src: '30.JPG'},
        {type: 'img', src: '31.JPEG'}, {type: 'img', src: '31.JPG'}, {type: 'img', src: '32.JPEG'},
        {type: 'img', src: '33(1).JPEG'}, {type: 'img', src: '33.JPEG'}, {type: 'img', src: '111.jpg'},
        {type: 'img', src: '112.jpg'}, {type: 'img', src: '113.jpg'}
    ];

    const lyrics = [
        { time: 0, text: "INITIALIZING..." },
        { time: 5, text: "TARGET: MA'AM NYX" },
        { time: 14, text: "A week ago you said to us..." },
        { time: 23, text: "Don't call us..." },
        { time: 26, text: "OFF THE CLOCK!" },
        { time: 46, text: "NEW MISSION AWAITS" },
        { time: 198, text: "SALUTE, MA'AM GANDA! 🫡" }
    ];

    const hotSeatIndices = [20, 22, 23];
    let currentIdx = 0, timer;
    const music = document.getElementById('bgMusic');

    // Build HUD
    const sidebar = document.getElementById('sidebar');
    const stage = document.getElementById('slide-container');

    mediaFiles.forEach((file, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb-link';
        thumb.dataset.index = (i + 1).toString().padStart(3, '0');
        thumb.onclick = () => jumpTo(i);
        
        const content = file.type === 'img' ? `<img src="${file.src}">` : `<div style="color:var(--gold); font-size:10px; padding:40px 10px;">VIDEO_FEED</div>`;
        thumb.innerHTML = content;
        sidebar.appendChild(thumb);

        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.innerHTML = file.type === 'img' ? `<img src="${file.src}">` : `<video src="${file.src}" muted></video>`;
        stage.appendChild(slide);
    });

    // Add Final Slide
    const finalSlide = document.createElement('div');
    finalSlide.className = 'slide';
    finalSlide.innerHTML = `
        <div class="final-box">
            <p style="letter-spacing:10px; color:var(--gold)">END OF TRANSMISSION</p>
            <h1>MA'AM NYX</h1>
            <p style="font-size:1.5rem; opacity:0.8">SAFE TRAVELS & CONGRATULATIONS! 🫡</p>
        </div>`;
    stage.appendChild(finalSlide);

    const slides = document.querySelectorAll('.slide');
    const thumbs = document.querySelectorAll('.thumb-link');

    function ignite() {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('nav-icon').style.display = 'block';
        music.play();
        runEngine();
        
        particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#d4af37" }, "line_linked": { "enable": true, "color": "#d4af37", "opacity": 0.2 }, "move": { "speed": 1 } } });

        music.ontimeupdate = () => {
            const active = lyrics.reduce((prev, curr) => (curr.time <= music.currentTime) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.innerText = active.text;
            }
        };
    }

    function jumpTo(idx) {
        clearTimeout(timer);
        currentIdx = idx;
        runEngine();
    }

    function runEngine() {
        slides.forEach((s, i) => {
            s.classList.remove('active');
            if(thumbs[i]) thumbs[i].classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        document.getElementById('hotSeatTag').style.display = hotSeatIndices.includes(currentIdx) ? 'block' : 'none';
        document.getElementById('recordPanel').classList.toggle('active', currentIdx === 0);

        slides[currentIdx].classList.add('active');
        if(thumbs[currentIdx]) {
            thumbs[currentIdx].classList.add('active');
            thumbs[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 4500);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
