<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Roast of Nyx | COMMAND CENTER V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.8);
            --bg: #050505; 
            --panel-bg: rgba(10, 10, 20, 0.9);
            --alert-red: #ff3333;
            --font-main: 'Rajdhani', sans-serif;
            --font-header: 'Oswald', sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: var(--font-main); 
            overflow: hidden; 
            height: 100%; 
        }

        /* Scanline Overlay Effect */
        body::after {
            content: " ";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 999;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.3; pointer-events: none; }
        
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Subtitles - Authored Style */
        #lyric-container {
            position: fixed; bottom: 8%; width: 100%;
            text-align: center; z-index: 100;
        }

        .subtitle-text {
            font-family: var(--font-header);
            font-size: 3rem; font-weight: 700;
            text-transform: uppercase;
            color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4);
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .subtitle-text.active { opacity: 1; transform: translateY(0); }

        /* Hot Seat Alert - Tactical Upgrade */
        .hot-seat-overlay {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            background: var(--alert-red); color: white;
            padding: 20px 40px; font-family: var(--font-header);
            border: 4px solid white; box-shadow: 0 0 50px var(--alert-red);
            text-transform: uppercase; font-size: 2.2rem; letter-spacing: 3px;
            animation: glitch-pulse 0.4s infinite;
            z-index: 500; display: none; text-align: center;
        }

        @keyframes glitch-pulse {
            0% { transform: translateX(-50%) scale(1); filter: hue-rotate(0deg); }
            50% { transform: translateX(-51%) scale(1.05); filter: hue-rotate(10deg); }
            100% { transform: translateX(-49%) scale(1); filter: hue-rotate(0deg); }
        }

        .icon-bounce { display: inline-block; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* Gate Screen */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            transition: opacity 1s ease;
        }

        .gate-card { 
            text-align: center; padding: 60px;
            border: 1px solid var(--gold); background: var(--panel-bg);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.2);
        }

        .start-btn { 
            margin-top: 40px; padding: 15px 50px; 
            background: var(--gold); border: none; 
            font-family: var(--font-header);
            color: black; font-weight: bold; font-size: 1.8rem; cursor: pointer; 
            letter-spacing: 4px; text-transform: uppercase;
            transition: 0.4s;
        }

        .start-btn:hover { background: white; box-shadow: 0 0 30px white; letter-spacing: 8px; }

        /* Stage */
        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out; 
            pointer-events: none; transform: scale(1.1);
        }
        .slide.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        .slide img, .slide video { 
            max-width: 85%; max-height: 75vh; 
            border: 2px solid var(--gold); padding: 5px; background: black;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Final Slide */
        .final-box h1 { font-family: var(--font-header); font-size: 5rem; color: var(--gold); margin: 0; }
        .final-box p { font-size: 1.5rem; letter-spacing: 4px; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="vignette"></div>

<audio id="laughTrack" src="laugh-track.mp3"></audio>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<div id="gate">
    <div class="gate-card">
        <h1 style="color: var(--gold); margin:0; font-family: 'Oswald'; font-size: 4rem; letter-spacing: 10px;">THE ROAST OF NYX</h1>
        <p style="letter-spacing: 8px; opacity: 0.6;">RPRMD COMMAND CENTER | SECTION IX</p>
        <button class="start-btn" onclick="ignite()">INITIALIZE ROAST</button>
    </div>
</div>

<div id="stage">
    <div id="hotSeatTag" class="hot-seat-overlay">
        ⚠️ <span class="icon-bounce">😂</span> BEST JUDGE EVER (HOT SEAT) <span class="icon-bounce">✌️</span> ⚠️
    </div>

    <div class="slide active"><img src="1.JPG"></div>
    <div class="slide"><video src="2.MOV" muted></video></div>
    <div class="slide"><video src="3.MOV" muted></video></div>
    <div class="slide"><video src="4.MOV" muted></video></div>
    <div class="slide"><img src="5.JPEG"></div>
    <div class="slide"><img src="6.JPEG"></div>
    <div class="slide"><img src="7.JPEG"></div>

    <div class="slide"><img src="9.JPEG"></div>
    <div class="slide"><img src="10.JPEG"></div>
    <div class="slide"><img src="11.JPEG"></div>
    <div class="slide"><img src="12.JPEG"></div>
    <div class="slide"><img src="13.JPEG"></div>
    <div class="slide"><img src="14.JPEG"></div>
    <div class="slide"><img src="15.JPEG"></div>
    <div class="slide"><img src="16.JPEG"></div>
    <div class="slide"><img src="17.JPEG"></div>
    <div class="slide"><img src="18.JPG"></div>
    <div class="slide"><img src="19.JPG"></div>
    <div class="slide"><img src="20.JPG"></div>
    
    <div class="slide"><img src="21.JPEG"></div> 
    <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div> 
    <div class="slide"><img src="24.JPEG"></div> 
    
    <div class="slide"><img src="25.JPG"></div>
    <div class="slide"><img src="26.JPG"></div>
    <div class="slide"><img src="27.JPG"></div>
    <div class="slide"><img src="28.JPG"></div>
    <div class="slide"><img src="29.JPG"></div>
    <div class="slide"><img src="30.JPG"></div>
    <div class="slide"><img src="31.JPEG"></div>
    <div class="slide"><img src="31.JPG"></div>
    <div class="slide"><img src="32.JPEG"></div>
    <div class="slide"><img src="33(1).JPEG"></div>
    <div class="slide"><img src="33.JPEG"></div>
    <div class="slide"><img src="111.jpg"></div>
    <div class="slide"><img src="112.jpg"></div>
    <div class="slide"><img src="113.jpg"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p style="letter-spacing: 15px; opacity: 0.5;">CASE CLOSED</p>
            <h1>MA'AM NYX POSTRANO</h1>
            <p style="color: var(--gold); font-style: italic; margin-top: 20px;">"New Unit, Same Legend."</p>
            <div style="width: 100px; height: 2px; background: var(--gold); margin: 30px auto;"></div>
            <p style="font-size: 1rem; opacity: 0.7; max-width: 600px;">
                You've officially cleared the RPRMD audit. <br>Safe travels to your next assignment, Ma'am Ganda! 🫡
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const laughTrack = document.getElementById('laughTrack');
    const subtitle = document.getElementById('subtitle');
    const hotSeatTag = document.getElementById('hotSeatTag');
    let currentIdx = 0;
    let timer;

    // INDICES FOR HOT SEAT (Slide 21, 23, 24)
    const hotSeatIndices = [20, 22, 23];

    const lyrics = [
        { time: 0, text: "🚨 ALERT: JUDGE NYX IN THE BUILDING 🚨" },
        { time: 5, text: "PROCEED WITH CAUTION" },
        { time: 14, text: "A week ago you said to us..." },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 31, text: "Transferring to a new beat" },
        { time: 46, text: "WALKING INTO THE NEW UNIT" },
        { time: 58, text: "But the roast will never end." },
        { time: 105, text: "CASE CLOSED: SURVIVED THE RPRMD!" },
        { time: 198, text: "SAFE TRAVELS, MA'AM GANDA 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { "number": { "value": 60 }, "color": { "value": "#d4af37" }, "opacity": { "value": 0.3 }, "move": { "speed": 1 } }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 1000);
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 50);
            }
        };
    }

    function runEngine() {
        slides.forEach(s => {
            s.classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        if (hotSeatIndices.includes(currentIdx)) {
            hotSeatTag.style.display = 'block';
            laughTrack.currentTime = 0;
            laughTrack.play();
        } else {
            hotSeatTag.style.display = 'none';
        }

        slides[currentIdx].classList.add('active');

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 4500); 
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
