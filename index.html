<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Roast of Nyx | Hot Seat Edition</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.8);
            --bg: #050505; 
            --panel-bg: rgba(10, 10, 20, 0.95);
            --alert-red: #ff3333;
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Tactical Background Effect */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.2; pointer-events: none; }
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Animated Subtitles */
        #lyric-container {
            position: fixed; bottom: 8%; width: 100%;
            text-align: center; z-index: 100;
        }

        .subtitle-text {
            font-size: 2.5rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: -1px;
            color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5);
            opacity: 0; transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .subtitle-text.active {
            opacity: 1; transform: scale(1) rotate(-1deg);
        }

        /* Hot Seat Alert */
        .hot-seat-overlay {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            background: var(--alert-red); color: white;
            padding: 15px 30px; font-weight: 900;
            border: 4px solid white; box-shadow: 0 0 40px var(--alert-red);
            text-transform: uppercase; font-size: 2rem; letter-spacing: 2px;
            animation: pulse 0.8s infinite alternate;
            z-index: 100; display: none; text-align: center;
        }

        @keyframes pulse {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.1); }
        }

        .icon-bounce { font-size: 2.5rem; margin: 0 10px; vertical-align: middle; }

        /* Intro / Gate Screen */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            transition: opacity 1s ease;
        }

        .gate-card { 
            text-align: center; padding: 50px;
            border: 2px solid var(--gold); background: var(--panel-bg);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        }

        .start-btn { 
            margin-top: 30px; padding: 20px 60px; 
            background: var(--gold); border: none; 
            color: black; font-weight: bold; font-size: 1.5rem; cursor: pointer; 
            letter-spacing: 5px; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s;
        }

        .start-btn:hover { transform: scale(1.05); background: white; box-shadow: 0 0 30px white; }

        /* Stage Styling */
        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 1s ease-in-out; 
            pointer-events: none;
        }
        .slide.active { opacity: 1; pointer-events: auto; }

        .slide img, .slide video { 
            max-width: 90%; max-height: 80vh; 
            border: 1px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .final-box h1 { font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin: 10px 0; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="vignette"></div>

<audio id="laughTrack" src="laugh-track.mp3"></audio>
<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<div id="gate">
    <div class="gate-card">

        <p style="letter-spacing: 5px; opacity: 0.7;">HOT SEAT MODE: ACTIVE</p>
        <button class="start-btn" onclick="ignite()">INITIALIZE ROAST</button>

</div>

<div id="stage">

    <div class="slide"><img src="20.JPG"></div>
    <div class="slide"><img src="21.JPEG"></div> <div class="slide"><img src="22.JPEG"></div>
    <div class="slide"><img src="23.JPEG"></div> <div class="slide"><img src="24.JPEG"></div> <div class="slide"><img src="25.JPG"></div>

    <div class="slide">
        <div class="final-box" style="text-align: center;">
            <p style="letter-spacing: 12px; margin-bottom: 25px; opacity: 0.7;">SURVIVED THE HOT SEAT</p>
            <h1>MA'AM NYX POSTRANO</h1>
            <p style="opacity: 0.9; margin-top: 30px; font-size: 1.3rem; letter-spacing: 3px; font-style: italic;">
                "New Unit, Same Legend."
            </p>
            <div style="width: 80px; height: 3px; background: var(--gold); margin: 30px auto; box-shadow: 0 0 15px var(--gold);"></div>
            <p style="opacity: 0.6; line-height: 1.6;">
                You are leaving behind a legacy of great memories (and great roasts).<br>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const music = document.getElementById('bgMusic');
    const laughTrack = document.getElementById('laughTrack');
    const subtitle = document.getElementById('subtitle');
    const hotSeatTag = document.getElementById('hotSeatTag');
    let currentIdx = 0;
    let timer;

    // HOT SEAT INDICES (Index value in the slides list, 20 = 21st slide)
    const hotSeatIndices = [20, 22, 23];

    // UPDATED FUNNY OFFICER JOKES
    const lyrics = [
        { time: 0, text: "🚨 ALERT: JUDGE NYX IN THE BUILDING 🚨" },
        { time: 5, text: "Prepare to be judged... humorously." },
        { time: 14, text: "A week ago you said to us..." },
        { time: 18, text: "\"Who's gonna handle all the paperwork?\"" },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 26, text: "We're busy crying at the coffee machine." },
        { time: 31, text: "Don't look back at the pending files..." },
        { time: 35, text: "They are someone else's problem now!" },
        { time: 41, text: "We'll see you... oh, we'll see you" },
        { time: 46, text: "WALKING INTO THE NEW UNIT" },
        { time: 50, text: "SMILING AT THE LACK OF DUTY" },
        { time: 54, text: "YOU'LL BE GREATLY MISSED" },
        { time: 58, text: "But the roast will never end." },
        { time: 65, text: "EVIDENCE OF A CAREER WELL SPENT" },
        { time: 80, text: "TRANSFERRING TO NEW HORIZONS!" },
        { time: 105, text: "CASE CLOSED: YOU SURVIVED THE RPRMD!" },
        { time: 138, text: "WALKING INTO YOUR NEXT CHAPTER," },
        { time: 142, text: "LEAVING THE JUDGMENT BEHIND!" },
        { time: 155, text: "Your new mission awaits, Judge." },
        { time: 198, text: "SAFE TRAVELS, MA'AM GANDA 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { "number": { "value": 100 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.2 }, "size": { "value": 1 }, "move": { "enable": true, "speed": 1 } }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 1000);
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 50);
            }
        };
    }

    function runEngine() {
        slides.forEach(s => {
            s.classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        // HOT SEAT LOGIC: Show text & play laugh track
        if (hotSeatIndices.includes(currentIdx)) {
            hotSeatTag.style.display = 'block';
            laughTrack.play();
        } else {
            hotSeatTag.style.display = 'none';
        }

        slides[currentIdx].classList.add('active');

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 5000); // Wait 5s for photos
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
