<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX POSTRANO | Tactical HUD v2.0</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.6);
            --bg: #020406; 
            --police-blue: rgba(0, 80, 180, 0.2);
            --panel-bg: rgba(0, 8, 15, 0.95);
            --alert-red: #ff003c;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Share Tech Mono', 'Consolas', monospace; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Tactical Grid Overlay */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--police-blue) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--police-blue) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 5; pointer-events: none; opacity: 0.3;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.4; }
        
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.95) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Layout Container */
        #main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 20;
            position: relative;
        }

        /* Sidebar: Interactive Archive */
        #sidebar {
            border-right: 1px solid var(--gold-glow);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 15px;
            scrollbar-width: none;
        }

        #sidebar::-webkit-scrollbar { display: none; }

        .thumb-link {
            width: 100%; min-height: 90px;
            border: 1px solid var(--police-blue);
            background: black;
            cursor: pointer; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .thumb-link::after {
            content: "SECURE_LOG"; position: absolute; bottom: 2px; right: 5px;
            font-size: 8px; color: var(--gold); opacity: 0.5;
        }

        .thumb-link:hover { border-color: var(--gold); transform: translateX(5px); }
        .thumb-link.active { 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 20px var(--gold-glow);
            transform: scale(1.05);
            z-index: 5;
        }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; transition: 0.3s; }
        .thumb-link.active img { opacity: 1; filter: contrast(1.1); }

        /* HUD Brackets */
        .hud-bracket {
            position: absolute; width: 30px; height: 30px;
            border: 2px solid var(--gold); z-index: 100; pointer-events: none;
        }
        .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        /* Remarks/Hot Seat Overlay */
        .hot-seat-overlay {
            position: absolute; top: 30px; right: 30px;
            background: var(--alert-red); color: white;
            padding: 10px 25px; font-weight: bold;
            border: 1px solid white; box-shadow: 0 0 30px var(--alert-red);
            text-transform: uppercase; letter-spacing: 3px;
            animation: pulse 0.5s infinite alternate;
            z-index: 100; display: none;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        @keyframes pulse {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.05); }
        }

        /* Stage */
        #stage {
            position: relative;
            background: var(--panel-bg); 
            border: 1px solid var(--police-blue);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }

        .slide {
            position: absolute; inset: 0; opacity: 0;
            display: flex; align-items: center; justify-content: center;
            transition: 0.6s ease-in-out; padding: 40px; pointer-events: none;
        }

        .slide.active { opacity: 1; pointer-events: auto; transform: scale(1) rotate(0deg); }

        .slide img, .slide video {
            max-width: 90%; max-height: 80vh;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 50;
        }

        /* Floating HUD Info */
        .hud-data {
            position: absolute; left: 20px; bottom: 20px;
            font-size: 10px; color: var(--gold); text-transform: uppercase;
            letter-spacing: 2px; line-height: 1.5; opacity: 0.7;
        }

        /* Subtitles */
        #lyric-container {
            position: fixed; bottom: 50px; right: 50px;
            text-align: right; z-index: 100; max-width: 60%;
        }

        .subtitle-text {
            font-size: 3rem; font-weight: 900;
            text-transform: uppercase; color: var(--gold);
            text-shadow: 0 0 20px var(--gold-glow);
            opacity: 0; transition: 0.4s;
            letter-spacing: -1px;
        }

        .subtitle-text.active { opacity: 1; transform: translateY(-10px); }

        /* Gate */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .gate-card { 
            text-align: center; padding: 60px; border: 1px solid var(--gold); 
            background: rgba(0, 10, 20, 0.9); box-shadow: 0 0 50px var(--gold-glow);
        }
        .start-btn { 
            background: var(--gold); padding: 15px 40px; border: none; cursor: pointer; 
            font-weight: bold; margin-top: 30px; letter-spacing: 5px;
            transition: 0.3s; text-transform: uppercase;
        }
        .start-btn:hover { background: white; box-shadow: 0 0 20px white; }

        .final-box h1 { font-size: 4rem; margin: 10px 0; color: var(--gold); }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="vignette"></div>

<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="gate">

<div id="main-layout">

                <p style="letter-spacing: 15px; opacity: 0.5;">UPLINK COMPLETE</p>
                <h1>MA'AM NYX</h1>
                <p style="font-style: italic; font-size: 1.5rem;">"New Unit, Same Legend."</p>
                <div style="width: 150px; height: 1px; background: var(--gold); margin: 30px auto;"></div>
                <p style="letter-spacing: 3px;">SAFE TRAVELS, MA'AM GANDA! 🫡</p>
                <button class="download-btn" style="margin-top:20px" onclick="alert('Preparing archive...')">EXPORT PERSONNEL DATA</button>

</div>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const sidebar = document.getElementById('sidebar');
    const music = document.getElementById('bgMusic');
    const subtitle = document.getElementById('subtitle');
    const hotSeatTag = document.getElementById('hotSeatTag');
    let currentIdx = 0;
    let timer;

    const hotSeatIndices = [20, 22, 23];

    // Build sidebar
    slides.forEach((s, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb-link';
        thumb.onclick = () => jumpTo(idx);
        
        const img = s.querySelector('img');
        if(img) {
            const clone = img.cloneNode();
            thumb.appendChild(clone);
        } else {
            thumb.innerHTML = `<span style="font-size:10px; color:var(--gold)">LOG_${idx}</span>`;
        }
        sidebar.appendChild(thumb);
    });

    const thumbs = document.querySelectorAll('.thumb-link');

    const lyrics = [
        { time: 0, text: "TARGET: NYX POSTRANO" },
        { time: 5, text: "INITIALIZING MEMORY STREAM" },
        { time: 14, text: "A week ago you said to us..." },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 26, text: "Because you're off the clock!" },
        { time: 31, text: "Transferring to a new beat" },
        { time: 46, text: "WALKING INTO THE NEW UNIT" },
        { time: 198, text: "MISSION ACCOMPLISHED 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { 
            "number": { "value": 60 }, 
            "color": { "value": "#d4af37" }, 
            "shape": { "type": "edge" },
            "opacity": { "value": 0.5 },
            "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2 },
            "move": { "speed": 1.2 } 
        }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('gate').style.display = 'none';
            music.play();
            runEngine();
        }, 500);
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 50);
            }
        };
    }

    function jumpTo(idx) {
        clearTimeout(timer);
        currentIdx = idx;
        runEngine();
    }

    function runEngine() {
        slides.forEach((s, i) => {
            s.classList.remove('active');
            thumbs[i].classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        if (hotSeatIndices.includes(currentIdx)) {
            hotSeatTag.style.display = 'block';
        } else {
            hotSeatTag.style.display = 'none';
        }

        slides[currentIdx].classList.add('active');
        thumbs[currentIdx].classList.add('active');
        thumbs[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 5000);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
