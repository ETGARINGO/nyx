<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX POSTRANO | Tactical Archive v3.0</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #020406; 
            --panel-bg: rgba(0, 10, 20, 0.85);
            --alert-red: #ff003c;
            --scan-line: rgba(212, 175, 55, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Share Tech Mono', 'Consolas', monospace; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; }

        /* HUD Frame Elements */
        .hud-bracket {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--gold); z-index: 50; pointer-events: none;
        }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        /* Layout */
        #main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 20; position: relative;
        }

        /* Sidebar */
        #sidebar {
            background: rgba(0, 15, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            scrollbar-width: none;
        }

        .thumb-link {
            width: 100%; height: 70px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            background: #000; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .thumb-link.active { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.3s; }
        .thumb-link.active img { opacity: 1; filter: sepia(0.3) brightness(1.2); }

        /* Stage */
        #stage {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .slide {
            position: absolute; inset: 0; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; padding: 40px;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide video {
            max-width: 90%; max-height: 80vh;
            border: 1px solid var(--gold);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            z-index: 5;
        }

        /* Data HUD Overlays */
        .data-stream {
            position: absolute; top: 40px; left: 40px;
            font-size: 11px; color: var(--gold); text-transform: uppercase;
            line-height: 1.4; opacity: 0.8; z-index: 10;
        }

        .hot-seat-overlay {
            position: absolute; top: 30px; right: 30px;
            background: var(--alert-red); color: white;
            padding: 8px 20px; font-weight: bold; font-size: 14px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            animation: pulse 0.5s infinite alternate;
            z-index: 100; display: none;
        }

        /* Subtitles */
        #lyric-container {
            position: fixed; bottom: 50px; right: 50px;
            text-align: right; z-index: 100;
        }
        .subtitle-text {
            font-size: 2.2rem; font-weight: 900;
            color: var(--gold); text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 2px 2px 10px #000;
            opacity: 0; transition: 0.3s;
        }
        .subtitle-text.active { opacity: 1; }

        /* Gate */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .gate-card { 
            border: 1px solid var(--gold); padding: 60px; text-align: center;
            background: radial-gradient(circle, #001529 0%, #000 100%);
        }
        .start-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 15px 40px; cursor: pointer; font-size: 1.2rem;
            margin-top: 30px; letter-spacing: 4px; transition: 0.3s;
        }
        .start-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 25px var(--gold); }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="gate">
    <div class="gate-card">
        <div style="font-size: 12px; color: var(--gold); margin-bottom: 15px; letter-spacing: 5px;">ESTABLISHING UPLINK...</div>
        <h1 style="color: var(--gold); margin:0; letter-spacing: 8px; font-size: 2.5rem;">NYX POSTRANO</h1>
        <button class="start-btn" onclick="ignite()">INITIALIZE HUD</button>
    </div>
</div>

<div id="main-layout">
    <div id="sidebar"></div>

    <div id="stage">
        <div class="hud-bracket tl"></div><div class="hud-bracket tr"></div>
        <div class="hud-bracket bl"></div><div class="hud-bracket br"></div>
        
        <div id="hotSeatTag" class="hot-seat-overlay">⚠️ CRITICAL: HOT SEAT ACTIVE ⚠️</div>
        
        <div class="data-stream" id="metaDisplay">
            SCANNING ARCHIVE...<br>
            OBJ: NYX_POSTRANO<br>
            LOC: NEW_UNIT_HQ<br>
            COORD: 14.5995° N, 120.9842° E
        </div>

        <div class="slide active"><img src="1.JPG"></div>
        <div class="slide"><video src="2.MOV" muted loop></video></div>
        <div class="slide"><video src="3.MOV" muted loop></video></div>
        <div class="slide"><video src="4.MOV" muted loop></video></div>
        <div class="slide"><img src="5.JPEG"></div>
        <div class="slide"><img src="6.JPEG"></div>
        <div class="slide"><img src="7.JPEG"></div>
        <div class="slide"><img src="8.JPEG"></div>
        <div class="slide"><img src="9.JPEG"></div>
        <div class="slide"><img src="10.JPEG"></div>
        <div class="slide"><img src="11.JPEG"></div>
        <div class="slide"><img src="12.JPEG"></div>
        <div class="slide"><img src="13.JPEG"></div>
        <div class="slide"><img src="14.JPEG"></div>
        <div class="slide"><img src="15.JPEG"></div>
        <div class="slide"><img src="16.JPEG"></div>
        <div class="slide"><img src="17.JPEG"></div>
        <div class="slide"><img src="18.JPG"></div>
        <div class="slide"><img src="19.JPG"></div>
        <div class="slide"><img src="20.JPG"></div>
        <div class="slide"><img src="21.JPEG"></div>
        <div class="slide"><img src="22.JPEG"></div>
        <div class="slide"><img src="23.JPEG"></div>
        <div class="slide"><img src="24.JPEG"></div>
        <div class="slide"><img src="25.JPG"></div>
        <div class="slide"><img src="26.JPG"></div>
        <div class="slide"><img src="27.JPG"></div>
        <div class="slide"><img src="28.JPG"></div>
        <div class="slide"><img src="29.JPG"></div>
        <div class="slide"><img src="30.JPG"></div>
        <div class="slide"><img src="31.JPEG"></div>
        <div class="slide"><img src="31.JPG"></div>
        <div class="slide"><img src="32.JPEG"></div>
        <div class="slide"><img src="33(1).JPEG"></div>
        <div class="slide"><img src="33.JPEG"></div>
        <div class="slide"><img src="111.jpg"></div>
        <div class="slide"><img src="112.jpg"></div>
        <div class="slide"><img src="113.jpg"></div>

        <div class="slide">
            <div style="text-align: center; border: 1px solid var(--gold); padding: 50px; background: rgba(0,0,0,0.9);">
                <p style="letter-spacing: 15px; color: var(--gold); margin-bottom: 20px;">MISSION ACCOMPLISHED</p>
                <h1 style="font-size: 3.5rem; margin: 10px 0;">MA'AM NYX</h1>
                <p style="font-style: italic; opacity: 0.8;">"Legend Status Confirmed."</p>
                <button class="start-btn" onclick="location.reload()">REPLAY ARCHIVE</button>
            </div>
        </div>
    </div>
</div>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const sidebar = document.getElementById('sidebar');
    const music = document.getElementById('bgMusic');
    const subtitle = document.getElementById('subtitle');
    const hotSeatTag = document.getElementById('hotSeatTag');
    const metaDisplay = document.getElementById('metaDisplay');
    let currentIdx = 0;
    let timer;
    const hotSeatIndices = [20, 22, 23];

    // Sidebar Initialization
    slides.forEach((s, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb-link';
        thumb.onclick = () => jumpTo(idx);
        const img = s.querySelector('img');
        if(img) {
            const clone = img.cloneNode();
            thumb.appendChild(clone);
        } else {
            thumb.innerHTML = `<div style="display:flex; height:100%; align-items:center; justify-content:center; font-size:9px; color:var(--gold)">VIDEO_LOG</div>`;
        }
        sidebar.appendChild(thumb);
    });

    const thumbs = document.querySelectorAll('.thumb-link');

    const lyrics = [
        { time: 0, text: "Uplink Secure: Hello Ma'am Nyx" },
        { time: 5, text: "Accessing Personnel Logs..." },
        { time: 14, text: "A week ago you said to us..." },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 26, text: "Because you're off the clock!" },
        { time: 31, text: "New Assignment Detected" },
        { time: 46, text: "Walking into the new unit..." },
        { time: 198, text: "Mission Complete. 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { "number": { "value": 60 }, "color": { "value": "#d4af37" }, 
        "line_linked": { "enable": true, "distance": 120, "color": "#d4af37", "opacity": 0.2 },
        "move": { "speed": 1 } }
    });

    function ignite() {
        document.getElementById('gate').style.transition = '0.8s';
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 800);
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 100);
            }
        };
    }

    function jumpTo(idx) {
        clearTimeout(timer);
        currentIdx = idx;
        runEngine();
    }

    function runEngine() {
        slides.forEach((s, i) => {
            s.classList.remove('active');
            thumbs[i].classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        hotSeatTag.style.display = hotSeatIndices.includes(currentIdx) ? 'block' : 'none';
        
        // Update Metadata Display
        metaDisplay.innerHTML = `
            SCANNING ARCHIVE...<br>
            FILE: NYX_MEM_${currentIdx.toString().padStart(3, '0')}<br>
            STATUS: DECRYPTED<br>
            TIMESTAMP: ${new Date().toLocaleTimeString()}
        `;

        slides[currentIdx].classList.add('active');
        thumbs[currentIdx].classList.add('active');
        thumbs[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 4000); // 4 seconds per image
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
