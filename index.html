<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Accomplished | Tactical Gallery</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.8);
            --bg: #050505; 
            --police-blue: rgba(0, 51, 102, 0.5);
            --panel-bg: rgba(0, 20, 40, 0.8);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Consolas', 'Courier New', monospace; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Tactical HUD Background */
        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.3; }
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Layout Container */
        #main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 20;
            position: relative;
        }

        /* Sidebar: Digital Archive List */
        #sidebar {
            border-right: 1px solid var(--police-blue);
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 15px;
        }

        .thumb-link {
            width: 100%;
            height: 120px;
            border: 1px solid var(--police-blue);
            background: var(--panel-bg);
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.5s ease;
            overflow: hidden;
            position: relative;
        }

        .thumb-link.visible {
            opacity: 0.5;
            transform: translateX(0);
        }

        .thumb-link.active {
            opacity: 1;
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .thumb-link img {
            width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%);
        }

        .thumb-link.active img { filter: grayscale(0%); }

        /* Stage: Main Viewport */
        #stage {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--police-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 1s ease-in-out;
            padding: 40px;
        }

        .slide.active { 
            opacity: 1; 
            animation: scanIn 0.8s ease-out forwards;
        }

        @keyframes scanIn {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }

        .slide img, .slide video {
            max-width: 95%;
            max-height: 85vh;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* Subtitles */
        #lyric-container {
            position: fixed;
            bottom: 5%;
            right: 5%;
            width: 60%;
            text-align: right;
            z-index: 100;
        }

        .subtitle-text {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--gold);
            text-shadow: 2px 2px 0px #000;
            opacity: 0;
            transition: 0.3s;
        }

        .subtitle-text.active { opacity: 1; }

        /* Final Box Styling */
        .final-box h1 { font-size: 3.5rem; color: var(--gold); }

        /* Gate */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .gate-card { 
            text-align: center; padding: 40px; border: 1px solid var(--gold); 
            background: var(--panel-bg); 
        }
        .start-btn { 
            background: var(--gold); padding: 10px 30px; border: none; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="vignette"></div>

<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="gate">

        <h1 style="color: var(--gold); margin:0;">SYSTEM AUTHORIZATION</h1>

        <button class="start-btn" onclick="ignite()">START MISSION DEBRIEF</button>

</div>

<div id="main-layout">

        </div>

        <div class="slide"><img src="13.JPEG"></div>
        <div class="slide"><img src="14.JPEG"></div>
        <div class="slide"><img src="15.JPEG"></div>
        <div class="slide"><img src="16.JPEG"></div>
        <div class="slide"><img src="17.JPEG"></div>
        <div class="slide"><img src="18.JPG"></div>

        <div class="slide"><img src="20.JPG"></div>
        <div class="slide"><img src="21.JPEG"></div>
        <div class="slide"><img src="22.JPEG"></div>
        <div class="slide"><img src="23.JPEG"></div>
        <div class="slide"><img src="24.JPEG"></div>
        <div class="slide"><img src="25.JPG"></div>
        <div class="slide"><img src="26.JPG"></div>
        <div class="slide"><img src="27.JPG"></div>

        <div class="slide">
            <div class="final-box" style="text-align: center;">
                <p style="letter-spacing: 12px; opacity: 0.7;">STATUS: MISSION ACCOMPLISHED</p>
                <h1>MA'AM NYX POSTRANO</h1>
                <p style="font-style: italic;">"New Unit, Same Legend."</p>
                <div style="width: 80px; height: 2px; background: var(--gold); margin: 20px auto;"></div>
                <p>SAFE TRAVELS, MA'AM GANDA! 🫡</p>
            </div>
        </div>
    </div>
</div>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const sidebar = document.getElementById('sidebar');
    const music = document.getElementById('bgMusic');
    const subtitle = document.getElementById('subtitle');
    let currentIdx = 0;

    // Build sidebar thumbnails
    slides.forEach((s, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb-link';
        const img = s.querySelector('img');
        if(img) {
            const clone = img.cloneNode();
            thumb.appendChild(clone);
        } else {
            thumb.innerHTML = `<div style="padding:20px; font-size:10px;">VIDEO_FILE</div>`;
        }
        sidebar.appendChild(thumb);
    });

    const thumbs = document.querySelectorAll('.thumb-link');

    const lyrics = [
        { time: 0, text: "TARGET IDENTIFIED: MA'AM NYX POSTRANO" },
        { time: 5, text: "PREPARE FOR EMOTIONAL BACKUP" },
        { time: 14, text: "A week ago you said to us..." },
        { time: 18, text: "Who's gonna handle all the paperwork?" },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 26, text: "Because you're officially off the clock!" },
        { time: 31, text: "Transferring to a new beat" },
        { time: 46, text: "WALKING INTO THE NEW UNIT" },
        { time: 54, text: "YOU'LL BE GREATLY MISSED" },
        { time: 65, text: "EVIDENCE OF A CAREER WELL SPENT" },
        { time: 198, text: "SAFE TRAVELS, MA'AM GANDA 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { "number": { "value": 60 }, "color": { "value": "#d4af37" }, "move": { "speed": 1 } }
    });

    function ignite() {
        document.getElementById('gate').style.display = 'none';
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 50);
            }
        };
    }

    function runEngine() {
        slides.forEach((s, i) => {
            s.classList.remove('active');
            thumbs[i].classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        slides[currentIdx].classList.add('active');
        thumbs[currentIdx].classList.add('active');
        thumbs[currentIdx].classList.add('visible');
        
        // Scroll sidebar to current thumb
        thumbs[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            setTimeout(advance, 4000);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
