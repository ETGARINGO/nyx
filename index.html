<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Accomplished | Interactive Tactical HUD</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.8);
            --bg: #050505; 
            --police-blue: rgba(0, 51, 102, 0.3);
            --panel-bg: rgba(0, 15, 30, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Consolas', 'Courier New', monospace; 
            overflow: hidden; 
            height: 100%; 
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; opacity: 0.3; }
        .vignette { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%); 
            z-index: 10; pointer-events: none; 
        }

        /* Layout Container */
        #main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
            z-index: 20;
            position: relative;
        }

        /* Sidebar: Interactive Archive */
        #sidebar {
            border-right: 1px solid var(--police-blue);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) transparent;
        }

        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--gold); }

        .thumb-link {
            width: 100%;
            min-height: 100px;
            border: 1px solid var(--police-blue);
            background: var(--panel-bg);
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-link:hover {
            border-color: var(--gold);
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        .thumb-link.active {
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
            opacity: 1 !important;
        }

        .thumb-link img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .thumb-link.active img { opacity: 1; }

        .thumb-label {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 5px;
            color: var(--gold);
        }

        /* Stage */
        #stage {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--police-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out;
            padding: 20px;
            pointer-events: none;
        }

        .slide.active { 
            opacity: 1; 
            pointer-events: auto;
            animation: scanIn 0.6s ease-out forwards;
        }

        @keyframes scanIn {
            from { clip-path: inset(0 100% 0 0); filter: brightness(3); }
            to { clip-path: inset(0 0 0 0); filter: brightness(1); }
        }

        .slide img, .slide video {
            max-width: 95%;
            max-height: 85vh;
            border: 1px solid var(--gold);
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* Subtitles & HUD */
        #lyric-container {
            position: fixed; bottom: 40px; right: 40px;
            text-align: right; z-index: 100; max-width: 50%;
        }

        .subtitle-text {
            font-size: 2.5rem; font-weight: 900;
            text-transform: uppercase; color: var(--gold);
            text-shadow: 3px 3px 0px #000;
            opacity: 0; transform: translateY(20px);
            transition: 0.4s;
        }

        .subtitle-text.active { opacity: 1; transform: translateY(0); }

        /* Gate */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .gate-card { 
            text-align: center; padding: 40px; border: 1px solid var(--gold); 
            background: var(--panel-bg); 
        }
        .start-btn { 
            background: var(--gold); padding: 10px 30px; border: none; cursor: pointer; font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="vignette"></div>

<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="gate">
    <div class="gate-card">
        <h1 style="color: var(--gold); margin:0;">SYSTEM AUTHORIZATION</h1>
        <p style="letter-spacing: 3px; opacity: 0.7;">ACCESSING PERSONNEL ARCHIVE: NYX POSTRANO</p>
        <button class="start-btn" onclick="ignite()">INITIALIZE HUD</button>
    </div>
</div>

<div id="main-layout">
    <div id="sidebar"></div>

    <div id="stage">
        <div class="slide active"><img src="1.JPG"></div>
        <div class="slide"><video src="2.MOV" muted></video></div>
        <div class="slide"><video src="3.MOV" muted></video></div>
        <div class="slide"><video src="4.MOV" muted></video></div>
        <div class="slide"><img src="5.JPEG"></div>
        <div class="slide"><img src="6.JPEG"></div>
        <div class="slide"><img src="7.JPEG"></div>
        <div class="slide"><img src="8.JPEG"></div>
        <div class="slide"><img src="9.JPEG"></div>
        <div class="slide"><img src="10.JPEG"></div>
        <div class="slide"><img src="11.JPEG"></div>
        <div class="slide"><img src="12.JPEG"></div>
        <div class="slide"><img src="13.JPEG"></div>
        <div class="slide"><img src="14.JPEG"></div>
        <div class="slide"><img src="15.JPEG"></div>
        <div class="slide"><img src="16.JPEG"></div>
        <div class="slide"><img src="17.JPEG"></div>
        <div class="slide"><img src="18.JPG"></div>
        <div class="slide"><img src="19.JPG"></div>
        <div class="slide"><img src="20.JPG"></div>
        <div class="slide"><img src="21.JPEG"></div>
        <div class="slide"><img src="22.JPEG"></div>
        <div class="slide"><img src="23.JPEG"></div>
        <div class="slide"><img src="24.JPEG"></div>
        <div class="slide"><img src="25.JPG"></div>
        <div class="slide"><img src="26.JPG"></div>
        <div class="slide"><img src="27.JPG"></div>
        <div class="slide"><img src="28.JPG"></div>
        <div class="slide"><img src="29.JPG"></div>
        <div class="slide"><img src="30.JPG"></div>
        <div class="slide"><img src="31.JPEG"></div>
        <div class="slide"><img src="31.JPG"></div>
        <div class="slide"><img src="32.JPEG"></div>
        <div class="slide"><img src="33(1).JPEG"></div>
        <div class="slide"><img src="33.JPEG"></div>
        <div class="slide"><img src="111.jpg"></div>
        <div class="slide"><img src="112.jpg"></div>
        <div class="slide"><img src="113.jpg"></div>

        <div class="slide">
            <div class="final-box" style="text-align: center;">
                <p style="letter-spacing: 12px; opacity: 0.7;">STATUS: MISSION ACCOMPLISHED</p>
                <h1>MA'AM NYX POSTRANO</h1>
                <p style="font-style: italic;">"New Unit, Same Legend."</p>
                <div style="width: 80px; height: 2px; background: var(--gold); margin: 20px auto;"></div>
                <p>SAFE TRAVELS, MA'AM GANDA! 🫡</p>
            </div>
        </div>
    </div>
</div>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const sidebar = document.getElementById('sidebar');
    const music = document.getElementById('bgMusic');
    const subtitle = document.getElementById('subtitle');
    let currentIdx = 0;
    let timer;

    // Create Clickable Thumbnails
    slides.forEach((s, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb-link';
        thumb.onclick = () => jumpTo(idx);
        
        const img = s.querySelector('img');
        if(img) {
            const clone = img.cloneNode();
            thumb.appendChild(clone);
        } else {
            thumb.innerHTML = `<span style="font-size:10px;">VIDEO_LOG</span>`;
        }
        
        const label = document.createElement('div');
        label.className = 'thumb-label';
        label.innerText = `IMG_${idx+100}`;
        thumb.appendChild(label);
        
        sidebar.appendChild(thumb);
    });

    const thumbs = document.querySelectorAll('.thumb-link');

    const lyrics = [
        { time: 0, text: "TARGET IDENTIFIED: MA'AM NYX POSTRANO" },
        { time: 5, text: "PREPARE FOR EMOTIONAL BACKUP" },
        { time: 14, text: "A week ago you said to us..." },
        { time: 18, text: "Who's gonna handle all the paperwork?" },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 26, text: "Because you're officially off the clock!" },
        { time: 31, text: "Transferring to a new beat" },
        { time: 35, text: "But the legend stays here" },
        { time: 46, text: "WALKING INTO THE NEW UNIT" },
        { time: 54, text: "YOU'LL BE GREATLY MISSED" },
        { time: 58, text: "ESPECIALLY BY THE RPRMD TEAM" },
        { time: 198, text: "SAFE TRAVELS, MA'AM GANDA 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { "number": { "value": 50 }, "color": { "value": "#d4af37" }, "move": { "speed": 0.8 } }
    });

    function ignite() {
        document.getElementById('gate').style.display = 'none';
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 50);
            }
        };
    }

    function jumpTo(idx) {
        clearTimeout(timer);
        currentIdx = idx;
        runEngine();
    }

    function runEngine() {
        slides.forEach((s, i) => {
            s.classList.remove('active');
            thumbs[i].classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        slides[currentIdx].classList.add('active');
        thumbs[currentIdx].classList.add('active');
        thumbs[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 5000);
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
