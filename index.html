<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX POSTRANO | Tactical Archive v2.0</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #020406; 
            --police-blue: #0044ff;
            --panel-bg: rgba(0, 10, 20, 0.85);
            --alert-red: #ff003c;
            --scan-line: rgba(212, 175, 55, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', 'Share Tech Mono', monospace; 
            overflow: hidden; 
            height: 100%; 
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; }

        /* HUD Frame Elements */
        .hud-border {
            position: fixed; border: 1px solid var(--gold-glow);
            z-index: 50; pointer-events: none;
        }
        .top-left { top: 20px; left: 20px; width: 100px; height: 100px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 20px; right: 20px; width: 100px; height: 100px; border-left: 0; border-top: 0; }

        /* Layout Container */
        #main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 30px;
            box-sizing: border-box;
            z-index: 20;
            position: relative;
        }

        /* Sidebar Customization */
        #sidebar {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 15px;
            scrollbar-width: none;
        }

        .thumb-link {
            width: 100%; height: 80px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            background: black;
            cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .thumb-link:hover { border-color: var(--gold); }
        .thumb-link.active { border: 1px solid var(--gold); box-shadow: 0 0 15px var(--gold-glow); }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .thumb-link.active img { opacity: 1; filter: sepia(0.5) brightness(1.2); }

        /* Stage Styling */
        #stage {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .slide {
            position: absolute; inset: 0; opacity: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }

        .slide.active { opacity: 1; }

        .slide img, .slide video {
            max-width: 90%; max-height: 80vh;
            border: 1px solid var(--gold);
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* Metadata Overlay */
        .meta-data {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 10px; color: var(--gold);
            text-transform: uppercase; line-height: 1.5;
            letter-spacing: 1px;
        }

        /* Subtitles - Cinematic Style */
        #lyric-container {
            position: fixed; bottom: 50px; left: 350px;
            z-index: 100;
        }

        .subtitle-text {
            font-size: 1.8rem; font-weight: 200;
            color: white; border-left: 4px solid var(--gold);
            padding-left: 15px; opacity: 0; transform: translateX(-20px);
            transition: 0.4s; text-transform: uppercase;
        }

        .subtitle-text.active { opacity: 1; transform: translateX(0); }

        /* Gate/Entry */
        #gate { 
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .gate-card { 
            border: 1px solid var(--gold); padding: 50px; text-align: center;
            background: radial-gradient(circle, #001529 0%, #000 100%);
        }
        .start-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 15px 40px; cursor: pointer; font-size: 1rem;
            margin-top: 30px; letter-spacing: 5px; transition: 0.3s;
        }
        .start-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }

        .hot-seat-overlay {
            position: absolute; top: 30px; right: 30px;
            background: var(--alert-red); color: white;
            padding: 8px 15px; font-size: 12px; font-weight: bold;
            display: none; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="hud-border top-left"></div>
<div class="hud-border bottom-right"></div>

<audio id="bgMusic" src="Walking in the Wind - One Direction (Lyrics) - Little Peach (128k).mp3"></audio>

<div id="gate">
    <div class="gate-card">
        <div style="font-size: 10px; color: var(--gold); margin-bottom: 10px;">SECURE TERMINAL ACCESS</div>
        <h1 style="color: var(--gold); margin:0; letter-spacing: 10px;">NYX POSTRANO</h1>
        <p style="opacity: 0.5; font-size: 12px;">DECRYPTING MISSION DATA...</p>
        <button class="start-btn" onclick="ignite()">INITIALIZE</button>
    </div>
</div>

<div id="main-layout">
    <div id="sidebar"></div>

    <div id="stage">
        <div id="hotSeatTag" class="hot-seat-overlay">STATUS: HIGH PRIORITY (HOT SEAT)</div>
        
        <div class="slide active"><img src="1.JPG"></div>
        <div class="slide"><video src="2.MOV" muted loop></video></div>
        <div class="slide"><video src="3.MOV" muted loop></video></div>
        <div class="slide"><video src="4.MOV" muted loop></video></div>
        <div class="slide"><img src="5.JPEG"></div>
        <div class="slide"><img src="6.JPEG"></div>
        <div class="slide"><img src="7.JPEG"></div>
        <div class="slide"><img src="8.JPEG"></div>
        <div class="slide"><img src="9.JPEG"></div>
        <div class="slide"><img src="10.JPEG"></div>
        <div class="slide"><img src="11.JPEG"></div>
        <div class="slide"><img src="12.JPEG"></div>
        <div class="slide"><img src="13.JPEG"></div>
        <div class="slide"><img src="14.JPEG"></div>
        <div class="slide"><img src="15.JPEG"></div>
        <div class="slide"><img src="16.JPEG"></div>
        <div class="slide"><img src="17.JPEG"></div>
        <div class="slide"><img src="18.JPG"></div>
        <div class="slide"><img src="19.JPG"></div>
        <div class="slide"><img src="20.JPG"></div>
        <div class="slide"><img src="21.JPEG"></div>
        <div class="slide"><img src="22.JPEG"></div>
        <div class="slide"><img src="23.JPEG"></div>
        <div class="slide"><img src="24.JPEG"></div>
        <div class="slide"><img src="25.JPG"></div>
        <div class="slide"><img src="26.JPG"></div>
        <div class="slide"><img src="27.JPG"></div>
        <div class="slide"><img src="28.JPG"></div>
        <div class="slide"><img src="29.JPG"></div>
        <div class="slide"><img src="30.JPG"></div>
        <div class="slide"><img src="31.JPEG"></div>
        <div class="slide"><img src="31.JPG"></div>
        <div class="slide"><img src="32.JPEG"></div>
        <div class="slide"><img src="33(1).JPEG"></div>
        <div class="slide"><img src="33.JPEG"></div>
        <div class="slide"><img src="111.jpg"></div>
        <div class="slide"><img src="112.jpg"></div>
        <div class="slide"><img src="113.jpg"></div>

        <div class="slide">
            <div style="text-align: center; border: 1px solid var(--gold); padding: 40px; background: rgba(0,0,0,0.8);">
                <p style="letter-spacing: 5px; color: var(--gold);">MISSION COMPLETED</p>
                <h1 style="font-size: 3rem;">LEGENDARY STATUS</h1>
                <p>SAFE TRAVELS, MA'AM GANDA! 🫡</p>
            </div>
        </div>
    </div>
</div>

<div id="lyric-container">
    <div id="subtitle" class="subtitle-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const slides = document.querySelectorAll('.slide');
    const sidebar = document.getElementById('sidebar');
    const music = document.getElementById('bgMusic');
    const subtitle = document.getElementById('subtitle');
    const hotSeatTag = document.getElementById('hotSeatTag');
    let currentIdx = 0;
    let timer;
    const hotSeatIndices = [20, 22, 23];

    // Initialize UI
    slides.forEach((s, idx) => {
        // Add meta-data text to every slide for HUD feel
        const meta = document.createElement('div');
        meta.className = 'meta-data';
        meta.innerHTML = `FILE: NYX_ARCHIVE_${idx.toString().padStart(3, '0')}<br>LAT: 14.5995° N | LONG: 120.9842° E<br>STATUS: DECRYPTED`;
        s.appendChild(meta);

        // Sidebar creation
        const thumb = document.createElement('div');
        thumb.className = 'thumb-link';
        thumb.onclick = () => jumpTo(idx);
        const img = s.querySelector('img');
        if(img) {
            const clone = img.cloneNode();
            thumb.appendChild(clone);
        } else {
            thumb.innerHTML = `<span style="font-size:9px; color:var(--gold)">VIDEO_STREAM</span>`;
        }
        sidebar.appendChild(thumb);
    });

    const thumbs = document.querySelectorAll('.thumb-link');

    const lyrics = [
        { time: 0, text: "System Initialized: Hello Ma'am Nyx" },
        { time: 5, text: "Loading Memories..." },
        { time: 14, text: "A week ago you said to us..." },
        { time: 23, text: "If we're lost, don't call us..." },
        { time: 26, text: "Because you're off the clock!" },
        { time: 31, text: "New Assignment Detected" },
        { time: 46, text: "Walking into the new unit..." },
        { time: 198, text: "End of Log. Safe Travels. 🫡" }
    ];

    particlesJS("particles-js", {
        "particles": { "number": { "value": 40 }, "color": { "value": "#d4af37" }, 
        "line_linked": { "enable": true, "distance": 150, "color": "#d4af37", "opacity": 0.2 },
        "move": { "speed": 1 } }
    });

    function ignite() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').style.display = 'none', 500);
        music.play();
        runEngine();
        
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const active = lyrics.reduce((prev, curr) => (curr.time <= current) ? curr : prev, null);
            if (active && subtitle.innerText !== active.text) {
                subtitle.classList.remove('active');
                setTimeout(() => {
                    subtitle.innerText = active.text;
                    subtitle.classList.add('active');
                }, 100);
            }
        };
    }

    function jumpTo(idx) {
        clearTimeout(timer);
        currentIdx = idx;
        runEngine();
    }

    function runEngine() {
        slides.forEach((s, i) => {
            s.classList.remove('active');
            thumbs[i].classList.remove('active');
            const v = s.querySelector('video');
            if(v) v.pause();
        });

        hotSeatTag.style.display = hotSeatIndices.includes(currentIdx) ? 'block' : 'none';

        slides[currentIdx].classList.add('active');
        thumbs[currentIdx].classList.add('active');
        thumbs[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });

        const video = slides[currentIdx].querySelector('video');
        if (video) {
            video.currentTime = 0;
            video.play();
            video.onended = advance;
        } else {
            timer = setTimeout(advance, 4000); // 4 seconds per image
        }
    }

    function advance() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            runEngine();
        }
    }
</script>
</body>
</html>
